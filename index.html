<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Young Douglas Insurance Services — Sales Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes raceMove{0%{transform:translateX(0)}50%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes gallop{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes challengePulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4)}50%{box-shadow:0 0 0 8px rgba(99,102,241,0)}}
input,select,textarea{font-family:inherit}
@media(max-width:600px){
  .ydi-header{flex-wrap:wrap;gap:8px !important}
  .ydi-header-btns{flex-wrap:wrap;justify-content:flex-end}
  .ydi-tabs{gap:2px !important}
  .ydi-tabs button{font-size:9px !important;padding:7px 2px !important}
  .ydi-agent-tabs button{min-width:70px !important;padding:5px 6px !important}
  .ydi-stat-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-h2h-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-badge-grid{grid-template-columns:repeat(3,1fr) !important}
  .ydi-review-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-goal-tiers{gap:3px !important}
  .ydi-main{padding:10px !important}
  .ydi-container{padding:0 !important}
}
@media(min-width:601px) and (max-width:900px){
  .ydi-stat-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-h2h-grid{grid-template-columns:repeat(2,1fr) !important}
}
@media(min-width:1200px){
  .ydi-container{max-width:100% !important;padding:0 24px !important}
}
@media(min-width:1600px){
  .ydi-container{max-width:1400px !important}
  .ydi-main{padding:24px !important}
}
</style>

function ChallengeModal({fromAgent,toAgent,agents,allAgents,onChallenge,onClose,T}){

      <div style={{fontSize:28,fontWeight:900,color:"#ef4444"}}>VS</div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40}}>{toAgent.avatar}</div>
        <div style={{fontSize:13,fontWeight:800,color:toAgent.color,marginTop:4}}>{toAgent.name.split(" ")[0]}</div>
        <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>{selectedMetric&&selectedMetric.fmt(toVal)}</div>

    <div style={{marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color:T.textSec,marginBottom:8}}>CHALLENGE METRIC — who finishes the period with more?</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {metrics.map(m=><button key={m.id} onClick={()=>setMetric(m.id)} style={{padding:"12px 16px",borderRadius:12,border:`2px solid ${metric===m.id?"#6366f1":T.border}`,background:metric===m.id?"#6366f108":T.bgCard,color:metric===m.id?"#6366f1":T.textSec,fontSize:13,fontWeight:metric===m.id?700:500,cursor:"pointer",textAlign:"left"}}>{m.label}</button>)}
      </div>
    </div>

      📊 Current standings: <strong>{fromAgent.name.split(" ")[0]}</strong> {selectedMetric?.fmt(fromVal)} vs <strong>{toAgent.name.split(" ")[0]}</strong> {selectedMetric?.fmt(toVal)} — {fromVal>toVal?fromAgent.name.split(" ")[0]+" leads!":toVal>fromVal?toAgent.name.split(" ")[0]+" leads!":"Tied!"}

function RaceTrack({agents,field,maxVal,icon,title,T,curPeriod}){
  const sorted=[...agents].sort((a,b)=>(b[field]||0)-(a[field]||0));
  // Period is over when today is past the end date
  const periodOver=curPeriod?(()=>{const e=new Date(curPeriod.end+"T23:59:59");return new Date()>e;})():false;
  return(
    <div style={{background:T.bgCard,borderRadius:16,padding:20,border:`1px solid ${T.border}`,marginBottom:16,boxShadow:T.shadow}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>{title}{periodOver&&<span style={{marginLeft:8,fontSize:11,background:"#fef3c7",color:"#b45309",padding:"2px 8px",borderRadius:6,fontWeight:700}}>🏁 PERIOD ENDED</span>}</div>
      {sorted.map((a,i)=>{
        const val=a[field]||0;
        const pct=maxVal>0?Math.min((val/maxVal)*100,100):0;
        const barPct=Math.max(pct,3);
        const isLeader=i===0&&val>0;
        return(
          <div key={a.id} style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:T.textSec}}>
              <span style={{fontWeight:700,color:a.color}}>{a.avatar} {a.name.split(" ")[0]}{isLeader?" 👑 LEADER":""}</span>
              <span style={{fontWeight:800,fontSize:13}}>{field==="totalRevenue"?fmtPrice(val):val+" policies"}</span>
            </div>
            <div style={{position:"relative",height:90,paddingTop:8,paddingRight:48}}>
              {/* Moving icon */}
              <div style={{position:"absolute",left:`calc(${barPct}% - 21px)`,top:0,zIndex:3,fontSize:42,lineHeight:1,filter:"drop-shadow(0 4px 8px rgba(0,0,0,0.28))",pointerEvents:"none"}}>
                <span style={{display:"inline-block",animation:field==="totalRevenue"?"raceMove 0.6s infinite":"gallop 0.45s infinite"}}>
                  <span style={{display:"inline-block",transform:"scaleX(-1)"}}>{icon}</span>
                </span>
              </div>
              {/* Track bar */}
              <div style={{position:"absolute",bottom:0,left:0,right:48,height:24,background:T.bgSubtle,borderRadius:"12px 0 0 12px",overflow:"hidden"}}>
                <div style={{width:`${barPct}%`,height:"100%",background:`linear-gradient(90deg,${a.color}55,${a.color})`,borderRadius:"12px 0 0 12px",transition:"width 1.5s"}}/>
              </div>
              {/* % label */}
              {pct>5&&<div style={{position:"absolute",bottom:6,left:`${Math.min(barPct-1,80)}%`,transform:"translateX(-50%)",fontSize:10,fontWeight:800,color:"#fff",pointerEvents:"none"}}>{pct.toFixed(0)}%</div>}
              {/* Finish line */}
              <div style={{position:"absolute",bottom:0,right:0,width:48,height:24,background:"repeating-linear-gradient(90deg,#1a1a1a 0px,#1a1a1a 6px,#fff 6px,#fff 12px)",borderRadius:"0 12px 12px 0",border:`1px solid ${T.border}`}}/>
              {/* Flag above finish — only show victory flag if period is OVER */}
              <div style={{position:"absolute",bottom:22,right:15,display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
                <div style={{
                  fontSize: periodOver&&isLeader ? 24 : 18,
                  lineHeight:1,
                  animation: periodOver&&isLeader ? "pulse 1s infinite" : "none",
                }}>
                  {periodOver && isLeader ? "🏆" : periodOver ? "🎌" : "🏁"}
                </div>
                <div style={{width:3,height:28,background:"#6b7280",borderRadius:2}}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* notification chime — plays when board gets new messages */
function playNotifChime(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[523,0],[659,0.18],[784,0.36],[1047,0.54]].forEach(([f,t])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+t+0.05);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.5);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.55);});}catch(e){}}

function MessageBoard({messages,onExternalUpdate,T}){
  const[collapsed,setCollapsed]=useState(false);
  const[flash,setFlash]=useState(false);
  const prevCount=useRef(messages.length);
  /* poll Apps Script every 30s for shared messages */
  useEffect(()=>{
    const poll=async()=>{
      try{
        const r=await fetch(`${PROXY_URL}?action=getMessages`,{redirect:"follow"});
        if(!r.ok)return;
        const txt=await r.text();
        if(!txt||txt.startsWith("<!"))return;
        const d=JSON.parse(txt);
        if(d.success&&Array.isArray(d.messages)&&onExternalUpdate){
          onExternalUpdate(d.messages);
        }
      }catch(e){}
    };
    poll();
    const id=setInterval(poll,30000);
    return()=>clearInterval(id);
  },[]);
  /* flash+sound when count increases */
  useEffect(()=>{
    if(messages.length>prevCount.current){
      setFlash(true);
      try{playNotifChime();}catch(e){}
      setTimeout(()=>setFlash(false),3000);
    }
    prevCount.current=messages.length;
  },[messages.length]);

  if(messages.length===0)return null;
  const pinned=messages.filter(m=>m.pinned);
  const regular=messages.filter(m=>!m.pinned);
  const sorted=[...pinned,...regular];
  return(
    <div style={{borderRadius:16,border:flash?`2px solid #3b82f6`:`1px solid #bfdbfe`,marginBottom:14,overflow:"hidden",boxShadow:flash?"0 0 18px #3b82f644":T.shadow,background:flash?"#dbeafe":"#eff6ff",transition:"all 0.4s"}}>
      <div onClick={()=>setCollapsed(!collapsed)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 18px",cursor:"pointer",borderBottom:collapsed?"none":"1px solid #bfdbfe",background:"#dbeafe"}}>
        <span style={{fontSize:16}}>📋</span>
        <span style={{fontSize:14,fontWeight:700,flex:1,color:"#1e40af"}}>Team Message Board</span>
        {flash&&<span style={{fontSize:9,background:"#3b82f6",color:"#fff",padding:"2px 8px",borderRadius:6,fontWeight:800,animation:"pulse 0.6s infinite"}}>🔔 NEW</span>}
        <span style={{fontSize:12,color:"#3b82f6",background:"#bfdbfe",padding:"2px 8px",borderRadius:10,fontWeight:700}}>{messages.length}</span>
        <span style={{fontSize:12,color:"#3b82f6"}}>{collapsed?"▼":"▲"}</span>
      </div>
      {!collapsed&&<div style={{padding:"12px 16px",maxHeight:280,overflow:"auto"}}>
        {sorted.map(m=>(
          <div key={m.id} style={{padding:"14px 18px",borderRadius:12,marginBottom:8,background:m.pinned?"#fefce8":"#fff",border:m.pinned?"1px solid #fde68a":"1px solid #bfdbfe",textAlign:"center",boxShadow:"0 1px 4px rgba(59,130,246,0.08)"}}>
            {m.pinned&&<div style={{marginBottom:6}}><span style={{fontSize:8,background:"#f59e0b",color:"#fff",padding:"2px 10px",borderRadius:4,fontWeight:700}}>📌 PINNED</span></div>}
            <div style={{fontSize:28,marginBottom:6}}>{m.emoji}</div>
            <div style={{fontSize:14,fontWeight:700,color:"#1e3a5f",lineHeight:1.55,marginBottom:6}}>{m.text}</div>
            <div style={{fontSize:11,color:"#3b82f6"}}>— {m.author} · {m.timestamp}</div>
          </div>
        ))}
      </div>}
    </div>
  );
}

/* ===== KPI TRENDS COMPONENT ===== */
function KPITrends({agents,selAgent,periods,selPeriodIdx,T,adminUnlocked}){
  const[trendTab,setTrendTab]=useState("weekly");
  const[hoverInfo,setHoverInfo]=useState(null); // {chartKey,idx,x,y,val}
  const agent=agents.find(a=>a.id===selAgent)||agents[0];
  const allSales=agent?.allSales||agent?.sales||[];

  function getWeeklyBuckets(sales,n=8){
    const now=new Date();now.setHours(23,59,59,999);
    const buckets=[];
    for(let w=n-1;w>=0;w--){
      const end=new Date(now);end.setDate(end.getDate()-(w*7));
      const start=new Date(end);start.setDate(start.getDate()-6);start.setHours(0,0,0,0);
      const ws=sales.filter(s=>s.boundDateObj&&s.boundDateObj>=start&&s.boundDateObj<=end);
      buckets.push({label:`${start.getMonth()+1}/${start.getDate()}`,premium:ws.reduce((s,x)=>s+x.price,0),policies:ws.length,life:ws.filter(s=>categorizePolicy(s.type)==="life").length,commercial:ws.filter(s=>categorizePolicy(s.type)==="commercial").length,personal:ws.filter(s=>categorizePolicy(s.type)==="personal").length});
    }
    return buckets;
  }
  function getPeriodBuckets(sales){
    const src=sales||allSales;
    return periods.map(p=>{
      const ps=new Date(p.start+"T00:00:00"),pe=new Date(p.end+"T23:59:59");
      const ps2=src.filter(s=>s.boundDateObj&&s.boundDateObj>=ps&&s.boundDateObj<=pe);
      return{label:p.name.split("-")[0],premium:ps2.reduce((s,x)=>s+x.price,0),policies:ps2.length,life:ps2.filter(s=>categorizePolicy(s.type)==="life").length,commercial:ps2.filter(s=>categorizePolicy(s.type)==="commercial").length,personal:ps2.filter(s=>categorizePolicy(s.type)==="personal").length};
    }).filter(b=>b.premium>0||b.policies>0);
  }
  function getDailyBuckets(sales,n=28){
    const src=sales||allSales;const now=new Date();now.setHours(23,59,59,999);
    const buckets=[];
    for(let d=n-1;d>=0;d--){
      const day=new Date(now);day.setDate(day.getDate()-d);
      const ds=new Date(day);ds.setHours(0,0,0,0);const de=new Date(day);de.setHours(23,59,59,999);
      const dSales=src.filter(s=>s.boundDateObj&&s.boundDateObj>=ds&&s.boundDateObj<=de);
      buckets.push({label:`${day.getMonth()+1}/${day.getDate()}`,premium:dSales.reduce((s,x)=>s+x.price,0),policies:dSales.length,life:dSales.filter(s=>categorizePolicy(s.type)==="life").length,commercial:dSales.filter(s=>categorizePolicy(s.type)==="commercial").length,personal:dSales.filter(s=>categorizePolicy(s.type)==="personal").length});
    }
    return buckets;
  }

  function getYearlyBuckets(sales){
    const now=new Date();const yr=now.getFullYear();
    return Array.from({length:12},(_,mo)=>{
      const ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0,23,59,59);
      const ws=(sales||allSales).filter(s=>s.boundDateObj&&s.boundDateObj>=ms&&s.boundDateObj<=me);
      const mNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return{label:mNames[mo],premium:ws.reduce((s,x)=>s+x.price,0),policies:ws.length,life:ws.filter(s=>categorizePolicy(s.type)==="life").length,commercial:ws.filter(s=>categorizePolicy(s.type)==="commercial").length,personal:ws.filter(s=>categorizePolicy(s.type)==="personal").length};
    });
  }

  const getBuckets=(sales)=>trendTab==="weekly"?getWeeklyBuckets(sales||allSales,8):trendTab==="period"?getPeriodBuckets(sales):trendTab==="yearly"?getYearlyBuckets(sales):getDailyBuckets(sales,28);
  const buckets=getBuckets(allSales);

  function trend(bkts,field){
    if(bkts.length<2)return{dir:"→",pct:0,color:T.textMuted};
    const cur=bkts[bkts.length-1][field],prev=bkts[bkts.length-2][field];
    if(prev===0)return cur>0?{dir:"↑",pct:100,color:"#059669"}:{dir:"→",pct:0,color:T.textMuted};
    const p=((cur-prev)/prev)*100;
    return p>0?{dir:"↑",pct:Math.abs(p).toFixed(0),color:"#059669"}:p<0?{dir:"↓",pct:Math.abs(p).toFixed(0),color:"#ef4444"}:{dir:"→",pct:0,color:T.textMuted};
  }

  const totPremium=buckets.reduce((s,b)=>s+b.premium,0);
  const totPolicies=buckets.reduce((s,b)=>s+b.policies,0);
  const totLife=buckets.reduce((s,b)=>s+b.life,0);
  const totComm=buckets.reduce((s,b)=>s+b.commercial,0);
  const totPL=buckets.reduce((s,b)=>s+b.personal,0);

  const kpis=[
    {key:"premium",label:"Premium",icon:"💰",color:"#f59e0b",total:fmtShort(totPremium),trend:trend(buckets,"premium"),fmt:fmtShort},
    {key:"policies",label:"Policies",icon:"📋",color:agent?.color||"#6366f1",total:totPolicies,trend:trend(buckets,"policies")},
    {key:"life",label:"Life",icon:"❤️",color:"#db2777",total:totLife,trend:trend(buckets,"life")},
    {key:"commercial",label:"Commercial",icon:"🏢",color:"#059669",total:totComm,trend:trend(buckets,"commercial")},
    {key:"personal",label:"Pers. Lines",icon:"🏠",color:"#6366f1",total:totPL,trend:trend(buckets,"personal")},
  ];

  /* ── SVG Line Chart ── */
  function LineChart({data,field,color,chartKey,fmt,height=140}){
    const PL=52,PR=16,PT=20,PB=36;
    const W=520,H=height;
    const vals=data.map(d=>d[field]);
    const maxV=Math.max(...vals,1);
    const xScale=(i)=>PL+(i/(Math.max(data.length-1,1)))*(W-PL-PR);
    const yScale=(v)=>PT+(1-(v/maxV))*(H-PT-PB);
    const pts=data.map((d,i)=>({x:xScale(i),y:yScale(d[field])}));
    // smooth bezier
    let pathD="";
    if(pts.length>1){
      pathD=`M${pts[0].x},${pts[0].y}`;
      for(let i=1;i<pts.length;i++){
        const cp1x=pts[i-1].x+(pts[i].x-pts[i-1].x)*0.38,cp1y=pts[i-1].y;
        const cp2x=pts[i].x-(pts[i].x-pts[i-1].x)*0.38,cp2y=pts[i].y;
        pathD+=` C${cp1x},${cp1y} ${cp2x},${cp2y} ${pts[i].x},${pts[i].y}`;
      }
    }
    const areaD=pts.length>1?pathD+` L${pts[pts.length-1].x},${H-PB} L${pts[0].x},${H-PB} Z`:"";
    const gradId=`lg_${chartKey}`;
    // Y grid: 4 evenly spaced lines
    const gridSteps=4;
    const grids=Array.from({length:gridSteps+1},(_,i)=>Math.round((maxV/gridSteps)*i));
    // X label every N points
    const xStep=Math.max(1,Math.ceil(data.length/7));
    return(
      <div style={{position:"relative"}} onMouseLeave={()=>setHoverInfo(null)}>
        <svg viewBox={`0 0 ${W} ${H+8}`} style={{width:"100%",height:height+8,display:"block",overflow:"visible"}}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
              <stop offset="85%" stopColor={color} stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          {/* Y gridlines + labels */}
          {grids.map((gv,gi)=>{
            const gy=yScale(gv);
            return(
              <g key={gi}>
                <line x1={PL} y1={gy} x2={W-PR} y2={gy} stroke={T.border} strokeWidth={gi===0?"1.2":"0.7"} strokeDasharray={gi===0?"none":"4,3"} opacity={gi===0?0.6:0.5}/>
                <text x={PL-6} y={gy+4} textAnchor="end" fontSize="11" fill={T.textMuted} fontFamily="inherit">{fmt?fmt(gv):gv}</text>
              </g>
            );
          })}
          {/* Area fill */}
          {areaD&&<path d={areaD} fill={`url(#${gradId})`}/>}
          {/* Line */}
          {pts.length>1&&<path d={pathD} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>}
          {/* X axis */}
          <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke={T.border} strokeWidth="1.2"/>
          {/* X labels */}
          {data.map((d,i)=>{
            if(i%xStep!==0&&i!==data.length-1)return null;
            return <text key={i} x={xScale(i)} y={H-PB+16} textAnchor="middle" fontSize="11" fill={T.textMuted} fontFamily="inherit">{d.label}</text>;
          })}
          {/* Data dots + hover zones */}
          {pts.map((p,i)=>{
            const isHov=hoverInfo?.chartKey===chartKey&&hoverInfo?.idx===i;
            const hasVal=data[i][field]>0;
            const zoneX=i===0?PL:(pts[i-1].x+p.x)/2;
            const nextX=i===pts.length-1?W-PR:(p.x+pts[i+1].x)/2;
            return(
              <g key={i}>
                {/* vertical hover line */}
                {isHov&&<line x1={p.x} y1={PT} x2={p.x} y2={H-PB} stroke={color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.6"/>}
                {/* invisible wide hover zone */}
                <rect x={zoneX} y={PT} width={nextX-zoneX} height={H-PT-PB} fill="transparent" style={{cursor:"crosshair"}}
                  onMouseEnter={()=>setHoverInfo({chartKey,idx:i,val:data[i][field],label:data[i].label,px:p.x,py:p.y})}/>
                {/* dot */}
                {hasVal&&<circle cx={p.x} cy={p.y} r={isHov?6:3.5} fill={isHov?color:T.bgCard} stroke={color} strokeWidth={isHov?2.5:2}/>}
              </g>
            );
          })}
          {/* Value callout on last non-zero point */}
          {(()=>{const last=pts.slice().reverse().find((_,i)=>vals[vals.length-1-i]>0);const li=last?pts.indexOf(last):-1;if(li<0)return null;const v=vals[li];const lx=pts[li].x,ly=pts[li].y;return <text x={lx} y={ly-10} textAnchor="middle" fontSize="12" fontWeight="800" fill={color} fontFamily="inherit">{fmt?fmt(v):v}</text>;})()} 
        </svg>
        {/* Tooltip */}
        {hoverInfo?.chartKey===chartKey&&(()=>{
          const p=pts[hoverInfo.idx];const leftPct=(p.x/W)*100;const topPct=(p.y/(H+8))*100;
          return(
            <div style={{position:"absolute",top:`${topPct}%`,left:`${leftPct}%`,transform:"translate(-50%,-130%)",background:T.bgCard,border:`2px solid ${color}`,borderRadius:10,padding:"7px 14px",fontSize:13,fontWeight:800,color:T.text,boxShadow:"0 6px 20px rgba(0,0,0,0.16)",pointerEvents:"none",whiteSpace:"nowrap",zIndex:20}}>
              <div style={{color}}>{fmt?fmt(hoverInfo.val):hoverInfo.val}</div>
              <div style={{fontSize:10,color:T.textMuted,fontWeight:500,marginTop:2}}>{hoverInfo.label}</div>
            </div>
          );
        })()}
      </div>
    );
  }

  const teamKPI=agents.map(a=>{
    const aS=a.allSales||a.sales||[];
    const b=getBuckets(aS);
    return{...a,buckets:b,totPrem:b.reduce((s,x)=>s+x.premium,0)};
  });

  if(buckets.every(b=>b.premium===0&&b.policies===0)){
    return(
      <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,marginBottom:14,boxShadow:T.shadow}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>📈 KPI Trends</div>
        <div style={{textAlign:"center",padding:"28px 0",color:T.textMuted}}>
          <div style={{fontSize:36,marginBottom:8}}>📊</div>
          <div style={{fontSize:13,fontWeight:600}}>No trend data yet.</div>
          <div style={{fontSize:11,marginTop:4}}>Once sales are logged, trend lines will appear here.</div>
        </div>
      </div>
    );
  }

  return(
    <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,marginBottom:14,boxShadow:T.shadow}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:15,fontWeight:800}}>📈 KPI Trends — {agent?.name?.split(" ")[0]}</div>
          <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>Hover points to see values · vs prior {trendTab==="daily"?"day":trendTab==="period"?"period":"week"}</div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {[{id:"daily",l:"Daily"},{id:"weekly",l:"Weekly"},{id:"period",l:"Period"},{id:"yearly",l:"📅 Full Year"}].map(t=>
            <button key={t.id} onClick={()=>setTrendTab(t.id)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${trendTab===t.id?agent?.color||"#6366f1":T.border}`,background:trendTab===t.id?`${agent?.color||"#6366f1"}12`:T.bgSubtle,color:trendTab===t.id?agent?.color||"#6366f1":T.textMuted,fontSize:12,fontWeight:trendTab===t.id?700:500,cursor:"pointer"}}>{t.l}</button>
          )}
        </div>
      </div>

      {/* KPI Summary row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:18}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{padding:"10px 8px",borderRadius:12,background:`${k.color}08`,border:`1px solid ${k.color}22`,textAlign:"center"}}>
            <div style={{fontSize:16,marginBottom:2}}>{k.icon}</div>
            <div style={{fontSize:17,fontWeight:900,color:k.color}}>{k.total}</div>
            <div style={{fontSize:9,color:T.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginTop:1}}>{k.label}</div>
            <div style={{fontSize:11,fontWeight:700,color:k.trend.color,marginTop:3}}>{k.trend.dir}{k.trend.pct>0?` ${k.trend.pct}%`:""}</div>
          </div>
        ))}
      </div>

      {/* Full-width line charts — stacked, large */}
      <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:18}}>
        {/* Big premium chart */}
        <div style={{padding:"14px 16px",borderRadius:14,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:T.text}}>💰 Premium Revenue</div>
            <div style={{fontSize:11,color:kpis[0].trend.color,fontWeight:700}}>{kpis[0].trend.dir}{kpis[0].trend.pct>0?` ${kpis[0].trend.pct}%`:""}</div>
          </div>
          <LineChart data={buckets} field="premium" color="#f59e0b" chartKey="prem" fmt={fmtShort} height={200}/>
        </div>
        {/* Policies + Life side by side */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[
            {key:"pol",field:"policies",label:"📋 Policies",color:agent?.color||"#6366f1",idx:1},
            {key:"life",field:"life",label:"❤️ Life Policies",color:"#db2777",idx:2},
          ].map(c=>(
            <div key={c.key} style={{padding:"14px 16px",borderRadius:14,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:800,color:T.text}}>{c.label}</div>
                <div style={{fontSize:11,color:kpis[c.idx].trend.color,fontWeight:700}}>{kpis[c.idx].trend.dir}{kpis[c.idx].trend.pct>0?` ${kpis[c.idx].trend.pct}%`:""}</div>
              </div>
              <LineChart data={buckets} field={c.field} color={c.color} chartKey={c.key} height={160}/>
            </div>
          ))}
        </div>
        {/* Commercial + Personal Lines side by side */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[
            {key:"comm",field:"commercial",label:"🏢 Commercial",color:"#059669",idx:3},
            {key:"pl",field:"personal",label:"🏠 Personal Lines",color:"#6366f1",idx:4},
          ].map(c=>(
            <div key={c.key} style={{padding:"14px 16px",borderRadius:14,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:800,color:T.text}}>{c.label}</div>
                <div style={{fontSize:11,color:kpis[c.idx].trend.color,fontWeight:700}}>{kpis[c.idx].trend.dir}{kpis[c.idx].trend.pct>0?` ${kpis[c.idx].trend.pct}%`:""}</div>
              </div>
              <LineChart data={buckets} field={c.field} color={c.color} chartKey={c.key} height={160}/>
            </div>
          ))}
        </div>
      </div>

      {/* Team comparison sparklines — visible to ALL producers */}
      <div style={{borderTop:`1px solid ${T.borderLight}`,paddingTop:14}}>
        <div style={{fontSize:12,fontWeight:700,color:T.textSec,marginBottom:10}}>👥 Team Premium Comparison — See Where You Stand</div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10}}>
          {teamKPI.sort((a,b)=>b.totPrem-a.totPrem).map((a)=>(
            <div key={a.id} style={{padding:"10px 12px",borderRadius:12,background:T.bgSubtle,border:`2px solid ${a.id===selAgent?a.color:T.borderLight}`,boxShadow:a.id===selAgent?`0 0 12px ${a.color}22`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                <span style={{fontSize:18}}>{a.avatar}</span>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:a.color}}>{a.name.split(" ")[0]}{a.id===selAgent?" ← You":""}</div>
                  <div style={{fontSize:10,color:T.textMuted}}>{fmtShort(a.totPrem)}</div>
                </div>
              </div>
              <LineChart data={a.buckets} field="premium" color={a.color} chartKey={`team_${a.id}`} fmt={fmtShort} height={70}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Parse a flat row object → sale record (outside App so stable) ── */
function parseRow(row){
  const rk=Object.keys(row);
  const find=(aliases)=>{for(const a of aliases){const k=rk.find(k=>k.toLowerCase().replace(/[^a-z]/g,"")===a.toLowerCase().replace(/[^a-z]/g,""));if(k&&row[k]!=null&&String(row[k]).trim()!=="")return row[k];}return null;};
  const name=find(["NAME","name","clientname","client","insuredname","insured","customername","customer"])||"Unknown";
  const rawPrice=find(["Price","price","premium","annualpremium","annual","prem","totalpremium","amount","cost"]);
  const price=rawPrice?parseFloat(String(rawPrice).replace(/[$,\s]/g,""))||0:0;
  const boundDate=find(["BoundDate","bounddate","bound","datebound","binddate","closeddate","closedate","dateclosed","sold"])||"";
  const effectiveDate=find(["EffectiveDate","effectivedate","effective","effdate"])||"";
  const platform=find(["Salesplatform","salesplatform","platform","carrier","company","provider"])||"Unknown";
  const type=find(["TypeofInsurance","typeofinsurance","type","linetype","insurancetype","line","coverage","policytype"])||"Other";
  const policyNumber=find(["PolicyNumber","policynumber","policy","policyno","polnum"])||"";
  const leadSource=find(["LeadSource","leadsource","source","leadsrc"])||"";
  const reviewRaw=find(["Reviews","reviews","Review","review","rating","feedback"])||"";
  const review=String(reviewRaw).trim();
  let boundDateObj=null,boundDateDisplay=String(boundDate||"").trim();
  const bdStr=boundDateDisplay;
  if(bdStr){
    if(!isNaN(bdStr)&&Number(bdStr)>40000){const d2=new Date((Number(bdStr)-25569)*86400*1000);if(!isNaN(d2))boundDateObj=d2;}
    else if(bdStr.includes("-")||bdStr.includes("T")){const d2=new Date(bdStr);if(!isNaN(d2))boundDateObj=d2;}
    else if(bdStr.includes("/")){const p=bdStr.split("/");if(p.length>=3)boundDateObj=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));}
    else{const d2=new Date(bdStr);if(!isNaN(d2))boundDateObj=d2;}
    if(boundDateObj&&!isNaN(boundDateObj)){const m=boundDateObj.getMonth()+1,d2=boundDateObj.getDate(),y=boundDateObj.getFullYear();boundDateDisplay=`${m}/${d2}/${y}`;}
  }
  return{name,status:"Bound",boundDate:boundDateDisplay,effectiveDate:String(effectiveDate),price,platform,type,policyNumber,referral:false,leadSource,review,daysToBindFromLead:null,boundDateObj};
}

function App(){
  const[dark,setDark]=useState(()=>loadLS("yd_dark",false));
  const T=dark?DARK_THEME:LIGHT;
  const[agentsCfg,setAgentsCfg]=useState(()=>{const v=loadLS("yd_cfg_v","");if(v!=="v14"){saveLS("yd_cfg_v","v14");saveLS("yd_agents",DEFAULT_AGENTS);return DEFAULT_AGENTS;}return loadLS("yd_agents",DEFAULT_AGENTS);});
  const[periods,setPeriods]=useState(()=>loadLS("yd_periods",DEFAULT_PERIODS));
  const[selPeriodIdx,setSelPeriodIdx]=useState(()=>getCurPeriodIdx(loadLS("yd_periods",DEFAULT_PERIODS)));
  const[periodOverridden,setPeriodOverridden]=useState(false);

  const[agents,setAgents]=useState([]);

  const[lastRefresh,setLastRefresh]=useState(null);
  const[refreshing,setRefreshing]=useState(false);
  const[tab,setTab]=useState("overview");

  const[hoverBadge,setHoverBadge]=useState(null);

  const[adminUnlocked,setAdminUnlocked]=useState(false);
  const[adminSecsLeft,setAdminSecsLeft]=useState(120);

      setTab(t=>t==="adminpanel"?"overview":t);

  },[]);
  const[showPeriods,setShowPeriods]=useState(false);
  const[showGuide,setShowGuide]=useState(false);
  const[showAvatar,setShowAvatar]=useState(false);
  const[showSound,setShowSound]=useState(false);
  const[showMsgAdmin,setShowMsgAdmin]=useState(false);
  const[teamGoalsCfg,setTeamGoalsCfg]=useState(()=>loadLS("yd_team_goals",DEFAULT_TEAM_GOALS));
  const[showTeamGoals,setShowTeamGoals]=useState(false);
  const[messages,setMessages]=useState(()=>loadLS("yd_messages",[]));
  const[ctmData,setCtmData]=useState(null);
  // Challenges
  const[challenges,setChallenges]=useState(()=>loadLS("yd_challenges",[]));
  const[showChallengeModal,setShowChallengeModal]=useState(false);
  const[challengeVs,setChallengeVs]=useState(null);

  const[showVision,setShowVision]=useState(false);

  // Goal celebrations — track which have fired so we only celebrate once per goal hit
  const[goalCelebration,setGoalCelebration]=useState(null); // {label,icon,sub}
  const celebratedGoals=useRef(new Set(loadLS("yd_celebrated_goals",[])));

  // Producer privacy — who is logged in as (non-admin)
  const[myId,setMyId]=useState(()=>loadLS("yd_myId",null));
  const[showWhoAreYou,setShowWhoAreYou]=useState(false);
  const[teamTrendHover,setTeamTrendHover]=useState(null);

  const[fetchLog,setFetchLog]=useState([]);
  const addLog=useCallback((msg)=>{const line=`${new Date().toLocaleTimeString()}: ${msg}`;console.log(line);setFetchLog(prev=>[line,...prev].slice(0,30));},[]);

  const applyFilter=useCallback((raw,idx)=>{const p=periods[idx];if(!p)return raw;return raw.map(a=>{const f=filterByPeriod(a.allSales||a.sales,p);return{...a,sales:f,totalRevenue:f.reduce((s,x)=>s+x.price,0),totalPolicies:f.length};});},[periods]);

  /* ── Direct CSV fetch — tries gid, sheet name, and all discovered tabs ── */
  const fetchAgentCSV=useCallback(async(ag)=>{
    if(!ag.sheetId){addLog(`⚠️ ${ag.name}: no sheetId`);return[];}
    const id=ag.sheetId;
    const seen=new Set();
    const all=[];

    const tryAdd=(rows,label)=>{
      if(!rows.length)return;
      rows.forEach(r=>{const k=`${r.name}|${r.boundDate}|${r.price}`;if(!seen.has(k)){seen.add(k);all.push(r);}});
      addLog(`✅ ${ag.name} [${label}]: ${rows.length} rows`);
    };

    const parse=(txt)=>{
      if(!txt||txt.length<20)return[];
      if(txt.trimStart().startsWith("<"))return[];
      try{return(Papa.parse(txt,{header:true,skipEmptyLines:true,transformHeader:h=>(h||"").trim()}).data||[]).map(parseRow).filter(r=>r.name&&r.name.toLowerCase()!=="name"&&r.price>0);}
      catch(e){return[];}
    };

    const get=async(url)=>{
      try{const r=await fetch(url,{redirect:"follow",cache:"no-store"});if(!r.ok)return[];return parse(await r.text());}
      catch(e){return[];}
    };

    // 1. Configured GID
    const gid=ag.gid||"0";
    tryAdd(await get(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`),`gid:${gid}`);

    // 2. Sheet names most likely to have current data
    const names=["3/19-4/17/2026","April folio 3/19-4/17/2026","3/19-4/17","Current Period",
      "2/18-3/18/2026","March folio 2/18-3/18/2026","4/18-5/19/2026","Sheet1","Data"];
    for(const n of names){
      tryAdd(await get(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`),`sheet:"${n}"`);
    }

    // 3. GIDs 0-5 fallback
    for(const g of ["0","1","2","3","4","5"].filter(g=>g!==String(gid))){
      tryAdd(await get(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${g}`),`gid:${g}`);
    }

    addLog(`${ag.name}: ${all.length} unique rows total`);
    return all;
  },[addLog]);

  const fetchAll=useCallback(async()=>{
    addLog("▶ fetchAll — direct CSV mode");
    const results=[];

    // Always try direct CSV first for every agent — most reliable
    for(const ag of agentsCfg){
      addLog(`Fetching ${ag.name} (sheet: ${ag.sheetId?.slice(-8)}, gid: ${ag.gid||0})`);
      const csvRows=await fetchAgentCSV(ag);
      results.push({...ag,allSales:csvRows,sales:csvRows,totalRevenue:csvRows.reduce((s,p)=>s+p.price,0),totalPolicies:csvRows.length,_src:"csv"});
    }

    const total=results.reduce((s,a)=>s+a.totalPolicies,0);
    addLog(`Direct CSV done: ${total} total policies`);

    // If all CSV failed, try proxy as backup
    if(total===0){
      addLog("CSV returned 0 rows — trying proxy backup");
      try{
        const url=`${PROXY_URL}?action=getAllData`;
        const r=await fetch(url,{redirect:'follow',credentials:'omit'});
        addLog(`Proxy HTTP ${r.status}`);
        if(r.ok){
          const text=await r.text();
          let json=null;
          try{const clean=text.replace(/^\uFEFF/,'').trim();json=JSON.parse(clean);}catch(e){const m=text.match(/\{[\s\S]*\}/);if(m)try{json=JSON.parse(m[0]);}catch(e2){}}
          if(json&&json.success&&json.data){
            addLog(`Proxy ✅ agents: ${Object.keys(json.data).join(',')}`);
            results.length=0;
            for(const ag of agentsCfg){
              const d=json.data[ag.id]||json.data[ag.name]||json.data[ag.name.split(" ")[0]];
              if(d?.rows?.length>0){
                const allSales=d.rows.map(parseRow).filter(s=>s.name&&s.name!=="NAME"&&s.price>0);
                addLog(`Proxy ${ag.name}: ${allSales.length} rows`);
                results.push({...ag,allSales,sales:allSales,totalRevenue:allSales.reduce((s,p)=>s+p.price,0),totalPolicies:allSales.length,_src:"proxy"});
              }else{
                results.push({...ag,allSales:[],sales:[],totalRevenue:0,totalPolicies:0,_src:"proxy-empty"});
              }
            }
          }else{addLog(`Proxy: bad response: ${text.slice(0,100)}`);}
        }
      }catch(e){addLog(`Proxy error: ${e.message}`);}
    }

    const final=results.length>0?results:agentsCfg.map(a=>({...a,allSales:[],sales:[],totalRevenue:0,totalPolicies:0}));
    setAllData(final);
    const filtered=applyFilter(final,selPeriodIdx);
    const newTotal=filtered.reduce((s,a)=>s+a.totalPolicies,0);
    addLog(`Done: ${newTotal} policies across all agents`);
    if(prevCount.current!==null&&newTotal>prevCount.current){
      for(const ag of filtered){
        const prev=prevAgents.current.find(a=>a.id===ag.id);
        if(prev&&ag.totalPolicies>prev.totalPolicies){
          const newest=ag.sales[ag.sales.length-1];
          if(newest){setNewPolicy({...newest,agentName:ag.name});playGong();launchConfetti();break;}
        }
      }
    }
    prevCount.current=newTotal;prevAgents.current=filtered;
    setAgents(filtered);setLastRefresh(new Date());setLoading(false);
    // Check if any goals just hit 100%
    checkGoalCelebrations(filtered,filtered.reduce((s,a)=>s+a.totalRevenue,0),newTotal,teamGoalsCfg);
  },[agentsCfg,applyFilter,selPeriodIdx,launchConfetti,fetchAgentCSV,addLog,checkGoalCelebrations,teamGoalsCfg]);

  const fetchCTM=useCallback(async()=>{
    if(!CTM_WEB_APP_URL)return;
    try{
      addLog(`CTM fetch: ${CTM_WEB_APP_URL}`);
      const r=await fetch(CTM_WEB_APP_URL,{redirect:'follow'});
      if(!r.ok){addLog(`CTM HTTP ${r.status}`);return;}
      const txt=await r.text();
      const d=JSON.parse(txt);
      setCtmData(d.producers||d.ctm||d.data||null);
      addLog(`CTM ✅ loaded: ${Object.keys(d.producers||d.ctm||d.data||{}).join(',')}`);
    }catch(e){addLog(`CTM error: ${e.message}`);}
  },[addLog]);

  // Play the loudest fanfare for goal celebrations
  const playGoalFanfare=useCallback(()=>{
    // Try hosted MP3 first
    const src="https://lamonte-dot.github.io/YDI-BATTLE-ROYALE/sounds/u_ss015dykrt-brass-fanfare-with-timpani-and-winchimes-reverberated-146260.mp3";
    try{
      const a=new Audio(src);
      a.volume=1.0;
      a.play().catch(()=>{
        // Fallback: synthesized fanfare
        try{
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          [[523,0],[659,0.12],[784,0.24],[1047,0.36],[784,0.55],[1047,0.68],[1319,0.8]].forEach(([f,t])=>{
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.connect(g);g.connect(ctx.destination);
            o.type="triangle";o.frequency.value=f;
            g.gain.setValueAtTime(0,ctx.currentTime+t);
            g.gain.linearRampToValueAtTime(0.35,ctx.currentTime+t+0.04);
            g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.6);
            o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.65);
          });
        }catch(e2){}
      });
    }catch(e){}
  },[]);

  // Check if any goal just crossed 100% — fire once per goal per period
  const checkGoalCelebrations=useCallback((filteredAgents,tRev,tPols,cfg)=>{
    const periodKey=curPeriod?.name||"alltime";
    const celebrate=(key,label,icon,sub)=>{
      const fullKey=`${periodKey}|${key}`;
      if(celebratedGoals.current.has(fullKey))return;
      celebratedGoals.current.add(fullKey);
      saveLS("yd_celebrated_goals",[...celebratedGoals.current]);
      setGoalCelebration({label,icon,sub});
      playGoalFanfare();
      launchConfetti();
      setTimeout(()=>setGoalCelebration(null),7000);
    };
    // Team premium goal
    if(cfg.premium>0&&tRev>=cfg.premium) celebrate("team_premium","TEAM PREMIUM GOAL HIT!","🏆",fmtShort(tRev)+" earned this period");
    // Team policies goal
    if(cfg.policies>0&&tPols>=cfg.policies) celebrate("team_policies","TEAM POLICY GOAL HIT!","🎯",`${tPols} policies bound this period`);
    // Individual goals
    filteredAgents.forEach(a=>{
      const g=a.goals||{};
      const b=getPolicyBreakdown(a.sales);
      if(g.premium>0&&a.totalRevenue>=g.premium) celebrate(`${a.id}_premium`,`${a.name.split(" ")[0]} Hit Premium Goal!`,"💰",fmtShort(a.totalRevenue)+" this period");
      if(g.policies>0&&a.totalPolicies>=g.policies) celebrate(`${a.id}_policies`,`${a.name.split(" ")[0]} Hit Policy Goal!`,"📋",`${a.totalPolicies} policies bound`);
      if(g.life>0&&b.life.count>=g.life) celebrate(`${a.id}_life`,`${a.name.split(" ")[0]} Hit Life Goal!`,"❤️",`${b.life.count} life policies`);
      if(g.commercial>0&&b.commercial.count>=g.commercial) celebrate(`${a.id}_commercial`,`${a.name.split(" ")[0]} Hit Commercial Goal!`,"🏢",`${b.commercial.count} commercial policies`);
      if(g.personalLines>0&&b.personal.count>=g.personalLines) celebrate(`${a.id}_pl`,`${a.name.split(" ")[0]} Hit PL Goal!`,"🏠",`${b.personal.count} personal lines`);
    });
  },[curPeriod,launchConfetti,playGoalFanfare]);

  useEffect(()=>{if(allData.length>0){const f=applyFilter(allData,selPeriodIdx);setAgents(f);prevCount.current=f.reduce((s,a)=>s+a.totalPolicies,0);prevAgents.current=f;}},[selPeriodIdx,periods,allData,applyFilter]);

  const curPeriod=periods[selPeriodIdx];
  const isCurPeriod=selPeriodIdx===getCurPeriodIdx(periods);
  const agent=agents.find(a=>a.id===selAgent)||agents[0];
  const sales=agent?.sales||[];const rev=agent?.totalRevenue||0;const pols=agent?.totalPolicies||0;
  const rTier=getTier(revTiers,rev);const pTier=getTier(polTiers,pols);
  const badges=getBadges(sales);const earned=badges.filter(a=>a.earned).length;
  const agentCTM=ctmData?ctmData[agent?.name]||ctmData[agent?.name?.split(" ")[0]]||null:null;
  const xp=calcXP(sales,agentCTM);const lvl=getLevel(xp);
  const teamRev=agents.reduce((s,a)=>s+a.totalRevenue,0);const teamPols=agents.reduce((s,a)=>s+a.totalPolicies,0);
  const sorted=[...agents].sort((a,b)=>b.totalRevenue-a.totalRevenue);
  const rankOf=sorted.findIndex(a=>a.id===selAgent)+1;
  const streak=getStreak(sales);
  const breakdown=getPolicyBreakdown(sales);
  const typeBreak={};sales.forEach(s=>{typeBreak[s.type]=(typeBreak[s.type]||0)+s.price;});
  const platBreak={};sales.forEach(s=>{platBreak[s.platform]=(platBreak[s.platform]||0)+1;});
  const lifeSales=sales.filter(s=>s.type.toLowerCase().includes("life"));
  const commCount=sales.filter(s=>categorizePolicy(s.type)==="commercial").length;
  const maxTeamRev=Math.max(...agents.map(a=>a.totalRevenue),1);
  const maxTeamPol=Math.max(...agents.map(a=>a.totalPolicies),1);
  const allReviews=agents.flatMap(a=>a.sales.filter(s=>s.review&&String(s.review).trim()).map(s=>({...s,review:String(s.review).trim(),agentName:a.name,agentAvatar:a.avatar,agentColor:a.color})));
  const teamGoalTier=getTier(TEAM_GOALS,teamRev);
  const lifeBoard=agents.map(a=>{const ls=a.sales.filter(s=>s.type.toLowerCase().includes("life"));return{...a,lifeCount:ls.length,lifePrem:ls.reduce((s,p)=>s+p.price,0)};}).sort((a,b)=>b.lifePrem-a.lifePrem);

  const getChallengeVal=(a,metric)=>{if(!a)return 0;if(metric==="life")return(a.sales||[]).filter(s=>categorizePolicy(s.type)==="life").length;if(metric==="commercial")return(a.sales||[]).filter(s=>categorizePolicy(s.type)==="commercial").length;return a[metric]||0;};

  const tabList=[
    {id:"overview",label:"Dashboard",icon:"📊"},
    {id:"goals",label:"Goals",icon:"🎯"},
    {id:"leaderboard",label:"Leaderboard",icon:"🏅"},
    {id:"teamkpi",label:"Team KPIs",icon:"📉"},
    {id:"achievements",label:"Badges",icon:"🏆"},
    {id:"missions",label:"Missions",icon:"⚔️"},
    {id:"breakdown",label:"Breakdown",icon:"📈"},
    {id:"reviews",label:"Reviews",icon:"⭐"},
    ...(adminUnlocked&&!myId?[{id:"adminpanel",label:"Admin",icon:"🔐"}]:[]),
  ];


  return(
    <div className="ydi-main" style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'Segoe UI',-apple-system,sans-serif",padding:16,position:"relative"}}>
      <canvas ref={canvasRef} style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:9998}}/>

      {/* ====== GOAL CELEBRATION OVERLAY ====== */}
      {goalCelebration&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9997,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{textAlign:"center",animation:"slideUp 0.5s cubic-bezier(.175,.885,.32,1.275)",background:"linear-gradient(135deg,#1a3c6e,#6366f1,#7c3aed)",borderRadius:28,padding:"40px 60px",boxShadow:"0 20px 80px rgba(0,0,0,0.5)",maxWidth:480,width:"90%",border:"3px solid rgba(255,255,255,0.3)"}}>
          <div style={{fontSize:80,lineHeight:1,marginBottom:12,animation:"pulse 0.6s infinite"}}>{goalCelebration.icon}</div>
          <div style={{fontSize:28,fontWeight:900,color:"#fff",letterSpacing:-0.5,marginBottom:8}}>{goalCelebration.label}</div>
          <div style={{fontSize:16,color:"#c4b5fd",fontWeight:600}}>{goalCelebration.sub}</div>
          <div style={{marginTop:18,display:"flex",justifyContent:"center",gap:6,fontSize:28}}>
            {"🎉🏆🎊🌟✨🔥💥🎯".split("").map((e,i)=><span key={i} style={{animation:`pulse ${0.5+i*0.08}s infinite`,display:"inline-block"}}>{e}</span>)}
          </div>

                  <HBarChart items={sortedByPol.map(a=>({label:a.name.split(" ")[0],value:a.totalPolicies,color:a.color,avatar:a.avatar}))} maxVal={maxPol}/>
                </div>
                {/* Commercial vs Life donut */}
                <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>

                    <DonutChart segments={[
                      {color:"#6366f1",value:teamBreak.personal.premium},
                      {color:"#db2777",value:teamBreak.life.premium},
                      {color:"#059669",value:teamBreak.commercial.premium},

                  {[{label:"Pers. Lines",color:"#6366f1",val:teamBreak.personal.premium},{label:"Life",color:"#db2777",val:teamBreak.life.premium},{label:"Commercial",color:"#059669",val:teamBreak.commercial.premium}].map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                      <div style={{flex:1,fontSize:11,color:T.textSec}}>{c.label}</div>
                      <div style={{fontSize:11,fontWeight:700,color:c.color}}>{fmtShort(c.val)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Row 3: Team Weekly Line Chart */}
              <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,marginBottom:14,boxShadow:T.shadow}}>
                <div style={{fontSize:13,fontWeight:800,marginBottom:14}}>📈 Team Weekly Premium Trend</div>
                {(()=>{
                  const vals=teamWeekly.map(b=>b.premium);
                  const maxV=Math.max(...vals,1);
                  const W=520,H=160,PL=52,PR=14,PT=16,PB=32;
                  const xs=(i)=>PL+(i/(teamWeekly.length-1||1))*(W-PL-PR);
                  const ys=(v)=>PT+(1-(v/maxV))*(H-PT-PB);
                  const pts=teamWeekly.map((b,i)=>({x:xs(i),y:ys(b.premium)}));
                  let pd="";
                  if(pts.length>1){pd=`M${pts[0].x},${pts[0].y}`;for(let i=1;i<pts.length;i++){const cx1=pts[i-1].x+(pts[i].x-pts[i-1].x)*0.38;const cx2=pts[i].x-(pts[i].x-pts[i-1].x)*0.38;pd+=` C${cx1},${pts[i-1].y} ${cx2},${pts[i].y} ${pts[i].x},${pts[i].y}`;}}
                  const area=pd?pd+` L${pts[pts.length-1].x},${H-PB} L${pts[0].x},${H-PB} Z`:"";
                  return(
                    <div style={{position:"relative"}} onMouseLeave={()=>setTeamTrendHover2(null)}>
                      <svg viewBox={`0 0 ${W} ${H+4}`} style={{width:"100%",height:H+4,overflow:"visible"}}>
                        <defs><linearGradient id="tg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" stopOpacity="0.25"/><stop offset="90%" stopColor="#6366f1" stopOpacity="0.01"/></linearGradient></defs>
                        {[0,Math.round(maxV/2),maxV].map((gv,gi)=>{const gy=ys(gv);return <g key={gi}><line x1={PL} y1={gy} x2={W-PR} y2={gy} stroke={T.border} strokeWidth={gi===0?"1":"0.7"} strokeDasharray={gi===0?"none":"4,3"}/><text x={PL-6} y={gy+4} textAnchor="end" fontSize="11" fill={T.textMuted} fontFamily="inherit">{fmtShort(gv)}</text></g>;})}
                        {area&&<path d={area} fill="url(#tg1)"/>}
                        {pd&&<path d={pd} fill="none" stroke="#6366f1" strokeWidth="3" strokeLinecap="round"/>}
                        <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke={T.border} strokeWidth="1.2"/>
                        {teamWeekly.map((b,i)=>{
                          const hov=teamTrendHover2===i;
                          return <g key={i}>
                            {hov&&<line x1={pts[i].x} y1={PT} x2={pts[i].x} y2={H-PB} stroke="#6366f1" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.6"/>}
                            <rect x={i===0?PL:(pts[i-1].x+pts[i].x)/2} y={PT} width={i===teamWeekly.length-1?(W-PR)-(pts[i-1].x+pts[i].x)/2:(pts[i+1]?((pts[i].x+pts[i+1].x)/2-(pts[i-1]?((pts[i-1].x+pts[i].x)/2):PL)):6)} height={H-PT-PB} fill="transparent" style={{cursor:"crosshair"}} onMouseEnter={()=>setTeamTrendHover2(i)}/>

                            <text x={pts[i].x} y={H-PB+16} textAnchor="middle" fontSize="10" fill={T.textMuted} fontFamily="inherit">{b.label}</text>
                          </g>;
                        })}
                      </svg>
                      {teamTrendHover2!==null&&teamWeekly[teamTrendHover2]&&(()=>{const p=pts[teamTrendHover2];return <div style={{position:"absolute",top:`${(p.y/(H+4))*100}%`,left:`${(p.x/W)*100}%`,transform:"translate(-50%,-130%)",background:T.bgCard,border:"2px solid #6366f1",borderRadius:10,padding:"7px 14px",fontSize:13,fontWeight:800,color:T.text,boxShadow:"0 6px 20px rgba(0,0,0,0.16)",pointerEvents:"none",whiteSpace:"nowrap",zIndex:20}}><div style={{color:"#6366f1"}}>{fmtShort(teamWeekly[teamTrendHover2].premium)}</div><div style={{fontSize:10,color:T.textMuted}}>{teamWeekly[teamTrendHover2].label} · {teamWeekly[teamTrendHover2].policies} pol</div></div>;})()}
                    </div>
                  );
                })()}
              </div>

              {/* Row 4: CTM Team Stats */}
              {ctmData&&<div style={{background:T.bgCard,borderRadius:16,padding:18,border:"1px solid #bae6fd",marginBottom:14,boxShadow:T.shadow}}>
                <div style={{fontSize:13,fontWeight:800,color:"#0891b2",marginBottom:14}}>📞 CTM Team Call Stats</div>
                <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10,marginBottom:14}}>

                    const aC=ctmData[a.name]||ctmData[a.name.split(" ")[0]]||null;
                    if(!aC)return null;
                    const ans=aC.answeredCalls||0,inb=aC.inboundLeads||0,mis=aC.missedCalls||0,tot=aC.totalCalls||ans+mis;
                    const rate=tot>0?Math.round((ans/tot)*100):0;
                    return <div key={a.id} style={{padding:"12px 14px",borderRadius:14,background:"#f0f9ff",border:"1px solid #bae6fd"}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}><span style={{fontSize:22}}>{a.avatar}</span><div style={{fontSize:12,fontWeight:700,color:a.color}}>{a.name.split(" ")[0]}</div></div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>
                        {[{l:"Answered",v:ans,c:"#059669"},{l:"Inbound",v:inb,c:"#6366f1"},{l:"Missed",v:mis,c:"#ef4444"},{l:"Ans. Rate",v:`${rate}%`,c:"#0891b2"}].map((s,si)=><div key={si} style={{textAlign:"center",padding:"6px 4px",background:"#fff",borderRadius:8,border:"1px solid #e0f2fe"}}><div style={{fontSize:16,fontWeight:900,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:s.c,fontWeight:700}}>{s.l}</div></div>)}
                      </div>
                      {tot>0&&<div style={{height:24,background:"#e0f2fe",borderRadius:12,overflow:"hidden"}}><div style={{width:`${rate}%`,height:"100%",background:"#059669",borderRadius:12,transition:"width 1.2s"}}/></div>}
                    </div>;
                  }).filter(Boolean)}
                </div>
                {/* CTM bar chart - calls comparison */}
                <div style={{marginTop:4}}>
                  <div style={{fontSize:12,fontWeight:700,color:T.textSec,marginBottom:10}}>Calls Answered — Producer Comparison</div>
                  <HBarChart items={agents.map(a=>{const aC=ctmData[a.name]||ctmData[a.name.split(" ")[0]]||null;return{label:a.name.split(" ")[0],value:(aC?.answeredCalls||0),color:a.color,avatar:a.avatar};}).sort((a,b)=>b.value-a.value)} maxVal={Math.max(...agents.map(a=>{const aC=ctmData[a.name]||ctmData[a.name.split(" ")[0]]||null;return aC?.answeredCalls||0;}),1)}/>
                </div>
              </div>}

              {/* Row 5: Per-producer KPI circles */}
              <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
                <div style={{fontSize:13,fontWeight:800,marginBottom:14}}>🎯 Producer Performance Summary</div>
                <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10}}>
                  {sortedByRev.map((a,rank)=>{
                    const aBreak=getPolicyBreakdown(a.sales);
                    const aXP=calcXP(a.sales,ctmData?ctmData[a.name]||ctmData[a.name.split(" ")[0]]||null:null);
                    const goals=a.goals||{premium:25000,policies:20};
                    const premPct=goals.premium>0?Math.min((a.totalRevenue/goals.premium)*100,100):0;
                    const polPct=goals.policies>0?Math.min((a.totalPolicies/goals.policies)*100,100):0;
                    return <div key={a.id} style={{padding:"14px 12px",borderRadius:14,background:T.bgSubtle,border:`1px solid ${T.borderLight}`,textAlign:"center"}}>
                      <div style={{fontSize:14,fontWeight:900,color:a.color,marginBottom:2}}>{["👑","🥈","🥉","4️⃣"][rank]||""} {a.name.split(" ")[0]}</div>
                      <div style={{fontSize:26,margin:"8px 0"}}>{a.avatar}</div>
                      <div style={{fontSize:18,fontWeight:900,color:"#059669",marginBottom:2}}>{fmtShort(a.totalRevenue)}</div>
                      <div style={{fontSize:11,color:T.textMuted,marginBottom:10}}>{a.totalPolicies} policies · {(aXP/1000).toFixed(1)}K XP</div>
                      <div style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.textMuted,marginBottom:3}}><span>💰 Premium</span><span>{premPct.toFixed(0)}%</span></div><div style={{height:24,background:T.bgCard,borderRadius:12,overflow:"hidden"}}><div style={{width:`${premPct}%`,height:"100%",background:`linear-gradient(90deg,${a.color}88,${a.color})`,borderRadius:12,transition:"width 1.2s"}}/></div></div>
                      <div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.textMuted,marginBottom:3}}><span>📋 Policies</span><span>{polPct.toFixed(0)}%</span></div><div style={{height:24,background:T.bgCard,borderRadius:12,overflow:"hidden"}}><div style={{width:`${polPct}%`,height:"100%",background:`linear-gradient(90deg,${a.color}88,${a.color})`,borderRadius:12,transition:"width 1.2s"}}/></div></div>
                      <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:10,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,background:"#eef2ff",color:"#6366f1",padding:"2px 7px",borderRadius:6,fontWeight:700}}>🏠{aBreak.personal.count}</span>
                        <span style={{fontSize:10,background:"#fdf2f8",color:"#db2777",padding:"2px 7px",borderRadius:6,fontWeight:700}}>❤️{aBreak.life.count}</span>
                        <span style={{fontSize:10,background:"#f0fdf4",color:"#059669",padding:"2px 7px",borderRadius:6,fontWeight:700}}>🏢{aBreak.commercial.count}</span>
                      </div>
                    </div>;
                  })}
                </div>
              </div>
            </>;
          })()}
        </div>}

        {/* ====== REVIEWS ====== */}
        {tab==="reviews"&&<div style={{animation:"slideUp 0.4s"}}>
          <div className="ydi-review-grid" style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:12,marginBottom:18}}>
            {agents.map(a=>{const revs=a.sales.filter(s=>s.review&&String(s.review).trim()),aBreak=getPolicyBreakdown(a.sales);return(
              <div key={a.id} style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow,textAlign:"center"}}>
                <div style={{fontSize:30,marginBottom:5}}>{a.avatar}</div>
                <div style={{fontSize:13,fontWeight:700,color:a.color,marginBottom:8}}>{a.name.split(" ")[0]}</div>
                <div style={{fontSize:18,fontWeight:900,color:"#059669",marginBottom:2}}>{fmtShort(a.totalRevenue)}</div>

                <div style={{display:"flex",justifyContent:"center",gap:8,fontSize:11,color:T.textMuted,marginBottom:10}}>
                  <span>🏠{aBreak.personal.count}</span><span>❤️{aBreak.life.count}</span><span>🏢{aBreak.commercial.count}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:20}}>⭐</span><span style={{fontSize:18,fontWeight:900}}>{revs.length}</span><span style={{fontSize:11,color:T.textMuted}}>reviews</span></div>
              </div>);})}
          </div>

            {allReviews.length===0?<div style={{textAlign:"center",padding:"36px 0",color:T.textMuted}}><div style={{fontSize:40,marginBottom:8}}>💬</div><div style={{fontSize:14,fontWeight:600}}>No reviews yet.</div><div style={{fontSize:12,marginTop:4}}>Add a "Reviews" column to your spreadsheet and enter customer feedback there.</div></div>
            :allReviews.map((r,i)=><div key={i} style={{padding:"14px 16px",borderRadius:14,marginBottom:10,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <span style={{fontSize:22}}>{r.agentAvatar}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:r.agentColor}}>{r.agentName}</div><div style={{fontSize:11,color:T.textMuted}}>{r.name} · {r.type} · {fmtPrice(r.price)} · {r.boundDate}</div></div>
                <span style={{fontSize:18}}>⭐</span>
              </div>
              <div style={{fontSize:13,color:T.textSec,fontStyle:"italic",lineHeight:1.6,padding:"4px 0 0 32px"}}>"{r.review}"</div>
            </div>)}
          </div>
        </div>}

        {/* ====== ADMIN TAB ====== */}
        {tab==="adminpanel"&&adminUnlocked&&!myId&&<div style={{animation:"slideUp 0.4s"}}>
          {/* Admin session banner */}
          {(()=>{
            const mins=Math.floor(adminSecsLeft/60);
            const secs=adminSecsLeft%60;
            const urgent=adminSecsLeft<=30;
            return <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderRadius:12,marginBottom:14,background:urgent?"#fef2f2":"#f0fdf4",border:`1px solid ${urgent?"#fca5a5":"#86efac"}`}}>
              <span style={{fontSize:20}}>{urgent?"⚠️":"🔓"}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:urgent?"#dc2626":"#059669"}}>
                  Admin session {urgent?"expiring soon!":"active"} — {mins}:{secs.toString().padStart(2,"0")} remaining
                </div>
                <div style={{fontSize:11,color:T.textMuted}}>Auto-locks after 2 minutes</div>
              </div>
              <button onClick={unlockAdmin} style={{padding:"7px 14px",borderRadius:9,border:"none",background:urgent?"#dc2626":"#059669",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>🔄 Extend +2min</button>
            </div>;
          })()}
          {/* Data Fetch Status */}
          <div style={{padding:"16px",background:T.bgCard,borderRadius:16,border:`2px solid ${fetchLog.some(l=>l.includes("✅")&&!l.includes("0 rows"))?"#059669":fetchLog.some(l=>l.includes("err")||l.includes("HTTP 4")||l.includes("failed"))?"#ef4444":"#6366f1"}`,boxShadow:T.shadow,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:T.text}}>🔍 Data Fetch Status</div>
                <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>
                  {agents.filter(a=>a.totalPolicies>0).length===0
                    ?"⚠️ No period data loaded"
                    :`✅ ${agents.reduce((s,a)=>s+a.totalPolicies,0)} period policies · ${agents.reduce((s,a)=>s+(a.allSales?.length||0),0)} all-time · ${agents.filter(a=>(a.allSales?.length||0)>0).map(a=>a.name.split(" ")[0]).join(", ")}`}
                </div>

            </div>
            {/* Per-agent cards */}
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10,marginBottom:12}}>
              {agents.map(a=>{
                const hasSales=(a.allSales?.length||0)>0;
                const csvUrl=`https://docs.google.com/spreadsheets/d/${a.sheetId}/export?format=csv&gid=${a.gid||0}`;
                return <div key={a.id} style={{padding:"12px",borderRadius:12,background:hasSales?"#f0fdf4":"#fff7ed",border:`1px solid ${hasSales?"#bbf7d0":"#fed7aa"}`}}>
                  <div style={{fontSize:14,fontWeight:700}}>{a.avatar} <span style={{color:a.color}}>{a.name.split(" ")[0]}</span></div>
                  <div style={{fontSize:13,fontWeight:800,color:hasSales?"#059669":"#d97706",margin:"4px 0"}}>{hasSales?`✅ ${a.totalPolicies} period · ${a.allSales?.length||0} all-time`:"⚠️ No data loaded"}</div>

          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${ctmData?"#bae6fd":T.border}`,marginBottom:14,boxShadow:T.shadow}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:15,fontWeight:800}}>📞 CTM Integration</div>
              <span style={{fontSize:11,background:ctmData?"#0891b2":"#d97706",color:"#fff",padding:"3px 10px",borderRadius:6,fontWeight:700}}>{ctmData?"● LIVE":"⚠️ NOT CONNECTED"}</span>
            </div>
            {ctmData?<div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10}}>
              {agents.map(a=>{
                const aC=ctmData[a.name]||ctmData[a.name.split(" ")[0]]||null;
                if(!aC)return <div key={a.id} style={{padding:"10px",borderRadius:10,background:T.bgSubtle,border:`1px solid ${T.borderLight}`,textAlign:"center"}}><div style={{fontSize:18}}>{a.avatar}</div><div style={{fontSize:11,color:a.color,fontWeight:700}}>{a.name.split(" ")[0]}</div><div style={{fontSize:10,color:"#d97706",marginTop:3}}>No CTM data</div></div>;
                return <div key={a.id} style={{padding:"10px",borderRadius:10,background:"#f0f9ff",border:"1px solid #bae6fd"}}>
                  <div style={{fontSize:18}}>{a.avatar}</div>
                  <div style={{fontSize:11,color:a.color,fontWeight:700,marginBottom:4}}>{a.name.split(" ")[0]}</div>
                  {[{l:"Answered",v:aC.answeredCalls||0,c:"#059669"},{l:"Inbound",v:aC.inboundLeads||0,c:"#6366f1"},{l:"Missed",v:aC.missedCalls||0,c:"#ef4444"}].map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{color:T.textMuted}}>{s.l}</span><span style={{fontWeight:700,color:s.c}}>{s.v}</span></div>)}
                </div>;
              })}
            </div>:<div style={{padding:"16px",background:"#fff7ed",borderRadius:10,fontSize:12,color:"#d97706"}}>CTM data is fetched from the Apps Script URL every 60 seconds. Make sure your Apps Script returns a <code>producers</code> key with call data.</div>}
          </div>

          {/* Quick Admin Actions */}
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
            <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>⚙️ Quick Actions</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[
                {label:"👥 Manage Producers",action:()=>setShowAdmin(true),color:"#6366f1"},
                {label:"📅 Edit Periods",action:()=>setShowPeriods(true),color:"#059669"},
                {label:"🎯 Team Goals",action:()=>setShowTeamGoals(true),color:"#f59e0b"},
                {label:"📋 Message Board",action:()=>setShowMsgAdmin(true),color:"#0891b2"},
              ].map((btn,i)=><button key={i} onClick={btn.action} style={{padding:"10px 18px",borderRadius:10,border:`1px solid ${btn.color}44`,background:`${btn.color}08`,color:btn.color,fontSize:13,fontWeight:700,cursor:"pointer"}}>{btn.label}</button>)}
            </div>
          </div>
        </div>}

        {/* FOOTER */}
        <div style={{marginTop:22,padding:"14px 18px",background:T.bgCard,borderRadius:14,border:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",fontSize:11,color:T.textMuted,flexWrap:"wrap",gap:6}}>
          <span>📡 {agents.length} Producers · {fmtPrice(teamRev)} · {teamPols} policies</span>
          <span>{curPeriod?.name||"All Time"} · {agent?.name} · #{rankOf} · {earned}/{badges.length} Badges</span>
          <span style={{color:"#6366f1",fontWeight:700}}>v15.0 — YDI Battle Royale</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
