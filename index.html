<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Young Douglas Insurance Services — Sales Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes raceMove{0%{transform:translateX(0)}50%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes gallop{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
input,select,textarea{font-family:inherit}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .ydi-header{flex-wrap:wrap;gap:8px !important}
  .ydi-header-btns{flex-wrap:wrap;justify-content:flex-end}
  .ydi-tabs{gap:2px !important}
  .ydi-tabs button{font-size:9px !important;padding:7px 2px !important}
  .ydi-agent-tabs button{min-width:70px !important;padding:5px 6px !important}
  .ydi-stat-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-h2h-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-badge-grid{grid-template-columns:repeat(3,1fr) !important}
  .ydi-review-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-goal-tiers{gap:3px !important}
  .ydi-main{padding:10px !important}
  .ydi-container{padding:0 !important}
}
@media(min-width:601px) and (max-width:900px){
  .ydi-stat-grid{grid-template-columns:repeat(2,1fr) !important}
  .ydi-h2h-grid{grid-template-columns:repeat(2,1fr) !important}
}
@media(min-width:1200px){
  .ydi-container{max-width:100% !important;padding:0 24px !important}
}
@media(min-width:1600px){
  .ydi-container{max-width:1400px !important}
  .ydi-main{padding:24px !important}
}
</style>

/* ===== POLICY CATEGORIZATION ===== */
function categorizePolicy(type){
  const t=(type||"").toLowerCase();
  if(t.includes("life")||t.includes("annuity")||t.includes("term")||t.includes("whole life")||t.includes("universal life"))return"life";
  if(t.includes("commercial")||t.includes("business")||t.includes("workers")||t.includes("bop")||t.includes("general liability")||t.includes("professional")||t.includes("restaurant")||t.includes("habitational")||t.includes("gl ")||t.includes("liability"))return"commercial";
  return"personal";
}
function getPolicyBreakdown(sales){
  const b={personal:{count:0,premium:0},life:{count:0,premium:0},commercial:{count:0,premium:0}};
  sales.forEach(s=>{const cat=categorizePolicy(s.type);b[cat].count++;b[cat].premium+=s.price;});
  return b;
}

/* ===== CONFETTI ===== */
function useConfetti(){const c=useRef(null),p=useRef([]),f=useRef(null);const launch=useCallback(()=>{const cv=c.current;if(!cv)return;const ctx=cv.getContext("2d");cv.width=window.innerWidth;cv.height=window.innerHeight;const cols=["#6366f1","#ec4899","#f59e0b","#10b981","#ef4444","#8b5cf6","#06b6d4"];for(let i=0;i<120;i++)p.current.push({x:Math.random()*cv.width,y:-20-Math.random()*400,w:6+Math.random()*6,h:4+Math.random()*4,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-0.5)*6,vy:2+Math.random()*4,rot:Math.random()*360,rs:(Math.random()-0.5)*12,life:1,decay:0.003+Math.random()*0.004});const anim=()=>{ctx.clearRect(0,0,cv.width,cv.height);p.current=p.current.filter(x=>x.life>0);p.current.forEach(x=>{x.x+=x.vx;x.vy+=0.08;x.y+=x.vy;x.rot+=x.rs;x.life-=x.decay;ctx.save();ctx.translate(x.x,x.y);ctx.rotate(x.rot*Math.PI/180);ctx.globalAlpha=x.life;ctx.fillStyle=x.color;ctx.fillRect(-x.w/2,-x.h/2,x.w,x.h);ctx.restore();});if(p.current.length>0)f.current=requestAnimationFrame(anim);};if(f.current)cancelAnimationFrame(f.current);anim();},[]);return{canvasRef:c,launch};}

function MiniBar({value,max,color,height=8,T}){const pct=max>0?Math.min((value/max)*100,100):0;return <div style={{width:"100%",height,background:T.bgSubtle,borderRadius:height/2,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:height/2,transition:"width 1.2s"}}/></div>;}

function AdminPanel({agentsCfg,onSave,onClose,T}){
  const[ed,setEd]=useState(agentsCfg.map(a=>({...a})));
  const[creating,setCreating]=useState({}); // tracks loading state per producer
  const[createMsg,setCreateMsg]=useState({});
  const colors=["#6366f1","#db2777","#0891b2","#d97706","#059669","#7c3aed","#dc2626","#0d9488","#ea580c","#4f46e5"];
  const add=()=>setEd([...ed,{id:"a_"+Date.now(),name:"",email:"",avatar:"👨‍💼",color:colors[ed.length%colors.length],gid:"",sheetId:"",sound:"chime",_new:true}]);
  const rm=i=>setEd(ed.filter((_,j)=>j!==i));
  const upd=(i,f,v)=>{const n=[...ed];n[i]={...n[i],[f]:v};setEd(n);};

  const createSheet=async(i)=>{
    const a=ed[i];
    if(!a.name.trim()){setCreateMsg({...createMsg,[i]:"Enter a name first"});return;}
    if(!SHEET_CREATOR_URL){setCreateMsg({...createMsg,[i]:"Set SHEET_CREATOR_URL in the config first"});return;}
    setCreating({...creating,[i]:true});
    setCreateMsg({...createMsg,[i]:"Creating sheet..."});
    try{
      const url=`${SHEET_CREATOR_URL}?action=createSheet&name=${encodeURIComponent(a.name)}&email=${encodeURIComponent(a.email||"")}`;
      const res=await fetch(url);
      const data=await res.json();
      if(data.success){
        const n=[...ed];
        n[i]={...n[i],sheetId:data.sheetId,gid:data.gid,_new:false};
        setEd(n);
        setCreateMsg({...createMsg,[i]:`✅ Sheet created! ID auto-filled.`});
      } else {
        setCreateMsg({...createMsg,[i]:`❌ Error: ${data.error||"Unknown error"}`});
      }
    }catch(e){
      setCreateMsg({...createMsg,[i]:`❌ Failed to connect. Check SHEET_CREATOR_URL.`});
    }
    setCreating({...creating,[i]:false});
  };

  return <Modal onClose={onClose} T={T}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:18,fontWeight:800}}>🔐 Admin — Manage Producers</h2>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:T.textMuted}}>×</button>
    </div>
    {ed.map((a,i)=><div key={i} style={{padding:14,borderRadius:14,marginBottom:10,background:a._new?`#f0fdf4`:T.bgSubtle,border:`1px solid ${a._new?"#bbf7d0":T.borderLight}`}}>
      {a._new&&<div style={{fontSize:10,fontWeight:700,color:"#059669",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>✨ New Producer</div>}
      <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
        <input value={a.name} onChange={e=>upd(i,"name",e.target.value)} placeholder="Producer Name" style={{flex:1,padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.bgCard,color:T.text}}/>
        <select value={a.avatar} onChange={e=>upd(i,"avatar",e.target.value)} style={{padding:"8px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:18,background:T.bgCard}}>{AVATAR_OPTIONS.map(av=><option key={av} value={av}>{av}</option>)}</select>
        <input type="color" value={a.color} onChange={e=>upd(i,"color",e.target.value)} style={{width:36,height:36,border:"none",borderRadius:8,cursor:"pointer"}}/>
        <button onClick={()=>rm(i)} style={{background:"#fee2e2",border:"none",borderRadius:8,padding:"8px 10px",cursor:"pointer",color:"#dc2626",fontWeight:700}}>🗑️</button>
      </div>
      {a._new&&<div style={{marginBottom:8}}>
        <input value={a.email||""} onChange={e=>upd(i,"email",e.target.value)} placeholder="Producer Email (for sheet sharing)" style={{width:"100%",padding:"7px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,background:T.bgCard,color:T.text}}/>
      </div>}
      {a._new&&!a.sheetId&&<div style={{marginBottom:8}}>
        <button onClick={()=>createSheet(i)} disabled={creating[i]} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:creating[i]?"#6ee7b7":"#059669",color:"#fff",fontSize:13,fontWeight:700,cursor:creating[i]?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {creating[i]?<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⏳</span>:"🚀"}
          {creating[i]?"Creating Google Sheet...":"Create Google Sheet Automatically"}
        </button>
        {createMsg[i]&&<div style={{fontSize:11,marginTop:5,color:createMsg[i].startsWith("✅")?"#059669":"#dc2626",fontWeight:600}}>{createMsg[i]}</div>}
      </div>}
      {a.sheetId&&<div style={{marginBottom:6,padding:"6px 10px",background:"#dcfce7",borderRadius:8,fontSize:11,color:"#059669",fontWeight:600}}>
        ✅ Sheet linked — {a.sheetId.slice(0,20)}...
        {createMsg[i]&&createMsg[i].startsWith("✅")&&<span style={{marginLeft:6}}>{createMsg[i]}</span>}
      </div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <input value={a.gid||""} onChange={e=>upd(i,"gid",e.target.value)} placeholder="GID (auto-filled)" style={{flex:1,minWidth:80,padding:"6px 10px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:11,background:T.bgCard,color:T.text}}/>
        <input value={a.sheetId||""} onChange={e=>upd(i,"sheetId",e.target.value)} placeholder="Sheet ID (auto-filled)" style={{flex:3,minWidth:150,padding:"6px 10px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:11,background:T.bgCard,color:T.text}}/>
        <select value={a.sound||"chime"} onChange={e=>upd(i,"sound",e.target.value)} style={{padding:"6px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,background:T.bgCard,color:T.text}}>{SOUND_OPTIONS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
        <button onClick={()=>playSound(a.sound)} style={{padding:"6px 8px",borderRadius:8,border:`1px solid ${T.border}`,background:T.bgCard,cursor:"pointer",fontSize:12}}>▶️</button>
      </div>
    </div>)}
    <button onClick={add} style={{width:"100%",padding:12,borderRadius:12,border:`2px dashed #059669`,background:"#f0fdf4",color:"#059669",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:16}}>+ Add New Producer</button>
    <div style={{display:"flex",gap:10}}>
      <button onClick={onClose} style={{flex:1,padding:12,borderRadius:12,border:`1px solid ${T.border}`,background:T.bgCard,color:T.textSec,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
      <button onClick={()=>{onSave(ed.filter(a=>a.name&&(a.gid||a.sheetId)));onClose();}} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#6366f1",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>💾 Save All</button>
    </div>
  </Modal>;
}

function RaceTrack({agents,field,maxVal,icon,title,T}){
  const sorted=[...agents].sort((a,b)=>(b[field]||0)-(a[field]||0));
  return <div style={{background:T.bgCard,borderRadius:16,padding:20,border:`1px solid ${T.border}`,marginBottom:16,boxShadow:T.shadow}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{title}</div>
    {sorted.map((a,i)=>{const val=a[field]||0;const pct=maxVal>0?Math.min((val/maxVal)*100,100):0;
      return <div key={a.id} style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4,color:T.textSec}}>
          <span style={{fontWeight:700,color:a.color}}>{a.avatar} {a.name.split(" ")[0]}{i===0&&val>0?" — LEADER":""}</span>
          <span style={{fontWeight:700}}>{field==="totalRevenue"?fmtPrice(val):val+" policies"}</span>
        </div>
        <div style={{position:"relative",height:28,background:T.bgSubtle,borderRadius:14,overflow:"hidden"}}>
          <div style={{width:`${Math.max(pct,4)}%`,height:"100%",background:`linear-gradient(90deg, ${a.color}44, ${a.color})`,borderRadius:14,transition:"width 1.5s"}}/>
          <div style={{position:"absolute",right:`${100-Math.max(pct,4)}%`,top:"50%",transform:"translateY(-50%)",fontSize:20,animation:field==="totalRevenue"?"raceMove 0.6s infinite":"gallop 0.5s infinite",marginRight:-12}}>{icon}</div>
        </div>
      </div>;})}
  </div>;
}

/* ===== DAILY MOTIVATION ===== */
function DailyMotivation({T}){
  const today=new Date();const idx=(today.getFullYear()*365+today.getMonth()*31+today.getDate())%MOTIVATIONAL_QUOTES.length;
  const q=MOTIVATIONAL_QUOTES[idx];
  return <div style={{background:`linear-gradient(135deg, #1a3c6e, #2563eb)`,borderRadius:16,padding:"18px 20px",marginBottom:14,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-20,right:-20,fontSize:80,opacity:0.08,transform:"rotate(15deg)"}}>💬</div>
    <div style={{fontSize:10,fontWeight:700,color:"#93c5fd",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Daily Motivation</div>
    <div style={{fontSize:15,fontWeight:700,color:"#ffffff",lineHeight:1.5,marginBottom:8,fontStyle:"italic"}}>"{q.quote}"</div>
    <div style={{fontSize:11,color:"#93c5fd",fontWeight:600}}>— {q.author}</div>
  </div>;
}

/* ===== MESSAGE BOARD (READ-ONLY) ===== */
function MessageBoard({messages,T}){
  const[collapsed,setCollapsed]=useState(false);
  const pinned=messages.filter(m=>m.pinned);
  const regular=messages.filter(m=>!m.pinned);
  const sorted=[...pinned,...regular];
  if(messages.length===0)return null;
  return <div style={{background:T.bgCard,borderRadius:16,border:`1px solid ${T.border}`,marginBottom:14,overflow:"hidden",boxShadow:T.shadow}}>
    <div onClick={()=>setCollapsed(!collapsed)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 18px",cursor:"pointer",borderBottom:collapsed?"none":`1px solid ${T.borderLight}`}}>
      <span style={{fontSize:16}}>📋</span>
      <span style={{fontSize:13,fontWeight:700,flex:1}}>Team Message Board</span>
      <span style={{fontSize:11,color:T.textMuted,background:T.bgSubtle,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{messages.length}</span>
      <span style={{fontSize:12,color:T.textMuted}}>{collapsed?"▼":"▲"}</span>
    </div>
    {!collapsed&&<div style={{padding:"10px 14px",maxHeight:220,overflow:"auto"}}>
      {sorted.map(m=><div key={m.id} style={{display:"flex",gap:10,padding:"8px 10px",borderRadius:10,marginBottom:6,background:m.pinned?"#fffbeb":T.bgSubtle,border:m.pinned?"1px solid #fde68a":`1px solid ${T.borderLight}`,alignItems:"flex-start"}}>
        <span style={{fontSize:20,flexShrink:0}}>{m.emoji}</span>
        <div style={{flex:1}}>
          {m.pinned&&<span style={{fontSize:8,background:"#f59e0b",color:"#fff",padding:"1px 5px",borderRadius:4,fontWeight:700,marginBottom:4,display:"inline-block"}}>📌 PINNED</span>}
          <div style={{fontSize:12,fontWeight:600,color:T.text,lineHeight:1.4}}>{m.text}</div>
          <div style={{fontSize:10,color:T.textMuted,marginTop:2}}>— {m.author} · {m.timestamp}</div>
        </div>
      </div>)}
    </div>}
  </div>;
}

/* ===== POLICY BREAKDOWN PANEL ===== */
function PolicyBreakdown({breakdown,totalPolicies,totalRevenue,color,T}){
  const cats=[
    {key:"personal",label:"Personal Lines",icon:"🏠",color:"#6366f1"},
    {key:"life",label:"Life",icon:"❤️",color:"#db2777"},
    {key:"commercial",label:"Commercial",icon:"🏢",color:"#059669"},
  ];
  return <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,marginBottom:14,boxShadow:T.shadow}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:700}}>📋 Policy Breakdown</div>
      <div style={{fontSize:12,color:T.textMuted}}>{totalPolicies} total · {fmtShort(totalRevenue)}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
      {cats.map(c=>{const d=breakdown[c.key];return <div key={c.key} style={{padding:"12px 10px",borderRadius:12,textAlign:"center",background:`${c.color}08`,border:`1px solid ${c.color}22`}}>
        <div style={{fontSize:20,marginBottom:4}}>{c.icon}</div>
        <div style={{fontSize:9,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{c.label}</div>
        <div style={{fontSize:18,fontWeight:800,color:c.color}}>{d.count}</div>
        <div style={{fontSize:10,color:T.textMuted,fontWeight:600}}>{fmtShort(d.premium)}</div>
      </div>;})}
    </div>
    {cats.map((c,i)=>{const d=breakdown[c.key];return <div key={c.key} style={{marginBottom:i<cats.length-1?8:0}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}><span style={{color:T.textSec}}>{c.icon} {c.label}</span><span style={{color:c.color,fontWeight:700}}>{totalPolicies>0?Math.round((d.count/totalPolicies)*100):0}%</span></div>
      <MiniBar value={d.count} max={totalPolicies||1} color={c.color} height={5} T={T}/>
    </div>;})}
  </div>;
}

/* ===== MAIN APP ===== */

  const fetchAll=useCallback(async()=>{
    const results=[];
    for(const ag of agentsCfg){
      try{const csv=await fetchCSV(ag.sheetId,ag.gid);if(!csv){results.push({...ag,allSales:[],sales:[],totalRevenue:0,totalPolicies:0});continue;}
        const parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});const headers=parsed.meta.fields||[];const allSales=parseRows(parsed.data,headers);
        results.push({...ag,allSales,sales:allSales,totalRevenue:allSales.reduce((s,p)=>s+p.price,0),totalPolicies:allSales.length});
      }catch(e){results.push({...ag,allSales:[],sales:[],totalRevenue:0,totalPolicies:0});}
    }
    setAllData(results);
    const filtered=applyFilter(results,selPeriodIdx);
    const newTotal=filtered.reduce((s,a)=>s+a.totalPolicies,0);
    if(prevCount.current!==null&&newTotal>prevCount.current){
      for(const ag of filtered){const prev=prevAgents.current.find(a=>a.id===ag.id);
        if(prev&&ag.totalPolicies>prev.totalPolicies){const newest=ag.sales[ag.sales.length-1];
          if(newest){setNewPolicy({...newest,agentName:ag.name});playSound(ag.sound||"chime");launchConfetti();break;}}}
    }
    prevCount.current=newTotal;prevAgents.current=filtered;setAgents(filtered);setLastRefresh(new Date());setLoading(false);
  },[agentsCfg,applyFilter,selPeriodIdx,launchConfetti]);

  // CTM fetch

  },[]);

  const handleRefresh=useCallback(async()=>{setRefreshing(true);await Promise.all([fetchAll(),fetchCTM()]);setRefreshing(false);},[fetchAll,fetchCTM]);

  const quests=[
    {cat:"💰 Revenue",name:"$25K",progress:rev,target:25000,reward:"500 XP",icon:"💵"},{cat:"💰 Revenue",name:"$50K",progress:rev,target:50000,reward:"750 XP",icon:"🏅"},{cat:"💰 Revenue",name:"$75K",progress:rev,target:75000,reward:"1K XP",icon:"🔥"},{cat:"💰 Revenue",name:"$100K",progress:rev,target:100000,reward:"2K XP",icon:"👑"},

            <div style={{fontSize:12,fontWeight:700,color:T.textSec,marginBottom:6,padding:"0 3px"}}>{cat}</div>
            {cq.map((q,i)=>{const pct=q.target>0?Math.min((q.progress/q.target)*100,100):0,done=pct>=100;return(
              <div key={i} style={{padding:"12px 14px",borderRadius:12,marginBottom:6,background:done?"#f0fdf4":T.bgCard,border:done?"1px solid #bbf7d0":`1px solid ${T.border}`,boxShadow:T.shadow}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{width:32,height:32,borderRadius:9,background:done?"#dcfce7":`${agent.color}08`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{done?"✅":q.icon}</div>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:done?"#059669":T.text}}>{q.name}</div><div style={{fontSize:9,color:T.textMuted}}>Reward: {q.reward}</div></div>
                  <div style={{fontSize:11,fontWeight:800,color:done?"#059669":agent.color}}>{pct.toFixed(0)}%</div></div>
                <MiniBar value={q.progress} max={q.target} color={done?"#059669":agent.color} height={4} T={T}/>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:9,color:T.textMuted}}><span>{q.progress>100?`$${q.progress.toLocaleString()}`:q.progress}/{q.target>100?`$${q.target.toLocaleString()}`:q.target}</span>{done&&<span style={{color:"#059669",fontWeight:700}}>DONE!</span>}</div>
              </div>);})}
          </div>;})}
        </div>}

        {/* ====== REVIEWS ====== */}
        {tab==="reviews"&&<div style={{animation:"slideUp 0.4s"}}>
          <div className="ydi-review-grid" style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10,marginBottom:16}}>
            {agents.map(a=>{const revs=a.sales.filter(s=>s.review&&s.review.trim()),aBreak=getPolicyBreakdown(a.sales);return(
              <div key={a.id} style={{background:T.bgCard,borderRadius:14,padding:16,border:`1px solid ${T.border}`,boxShadow:T.shadow,textAlign:"center"}}>
                <div style={{fontSize:26,marginBottom:4}}>{a.avatar}</div>
                <div style={{fontSize:12,fontWeight:700,color:a.color,marginBottom:6}}>{a.name.split(" ")[0]}</div>
                <div style={{fontSize:16,fontWeight:800,color:"#059669",marginBottom:1}}>{fmtShort(a.totalRevenue)}</div>
                <div style={{fontSize:10,color:T.textMuted,marginBottom:6}}>{a.totalPolicies} policies</div>
                <div style={{display:"flex",justifyContent:"center",gap:6,fontSize:10,color:T.textMuted,marginBottom:8}}>
                  <span>🏠{aBreak.personal.count}</span><span>❤️{aBreak.life.count}</span><span>🏢{aBreak.commercial.count}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  <span style={{fontSize:16}}>⭐</span><span style={{fontSize:14,fontWeight:800}}>{revs.length}</span><span style={{fontSize:10,color:T.textMuted}}>reviews</span>
                </div>
              </div>);})}
          </div>
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>⭐ Customer Reviews ({allReviews.length})</div>
            {allReviews.length===0?<div style={{textAlign:"center",padding:"30px 0",color:T.textMuted}}><div style={{fontSize:36,marginBottom:8}}>💬</div><div style={{fontSize:13,fontWeight:600}}>No reviews yet. Add a "Review" column to your spreadsheet!</div></div>
            :allReviews.map((r,i)=><div key={i} style={{padding:"12px 14px",borderRadius:12,marginBottom:8,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:18}}>{r.agentAvatar}</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:r.agentColor}}>{r.agentName}</div><div style={{fontSize:10,color:T.textMuted}}>{r.name} · {r.type} · {fmtPrice(r.price)} · {r.boundDate}</div></div>
                <span style={{fontSize:14}}>⭐</span>
              </div>
              <div style={{fontSize:12,color:T.textSec,fontStyle:"italic",lineHeight:1.5,padding:"4px 0 0 28px"}}>"{r.review}"</div>
            </div>)}
          </div>
        </div>}

        {/* FOOTER */}
        <div style={{marginTop:20,padding:"12px 16px",background:T.bgCard,borderRadius:12,border:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",fontSize:10,color:T.textMuted,flexWrap:"wrap",gap:6}}>
          <span>📡 {agents.length} Producers · {fmtPrice(teamRev)} / {teamPols} pol</span>
          <span>{curPeriod?.name||"All Time"} · {agent.name} · #{rankOf} · {earned}/{badges.length} Badges</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
