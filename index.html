/* ===== POLICY CATEGORIZATION ===== */
function categorizePolicy(type){
  const t=(type||"").toLowerCase();
  if(t.includes("life")||t.includes("annuity")||t.includes("term")||t.includes("whole life")||t.includes("universal life"))return"life";
  if(t.includes("commercial")||t.includes("business")||t.includes("workers")||t.includes("bop")||t.includes("general liability")||t.includes("professional")||t.includes("restaurant")||t.includes("habitational")||t.includes("gl ")||t.includes("liability"))return"commercial";
  return"personal";
}
function getPolicyBreakdown(sales){
  const b={personal:{count:0,premium:0},life:{count:0,premium:0},commercial:{count:0,premium:0}};
  sales.forEach(s=>{const cat=categorizePolicy(s.type);b[cat].count++;b[cat].premium+=s.price;});
  return b;
}

function MessageBoardAdmin({messages,onSave,onClose,T}){

  const[newMsg,setNewMsg]=useState({text:"",author:"LaMonte",emoji:"📢",pinned:false});
  const emojis=["📢","🔥","💪","🏆","⚡","🎯","💰","📈","🌟","🎉","👑","🚀"];
  const add=()=>{if(!newMsg.text.trim())return;setMsgs([{id:Date.now(),...newMsg,timestamp:new Date().toLocaleDateString()},...msgs]);setNewMsg({text:"",author:"LaMonte",emoji:"📢",pinned:false});};
  const rm=id=>setMsgs(msgs.filter(m=>m.id!==id));
  const pin=id=>setMsgs(msgs.map(m=>m.id===id?{...m,pinned:!m.pinned}:m));
  return <Modal onClose={onClose} T={T}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:18,fontWeight:800}}>📋 Message Board Admin</h2><button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:T.textMuted}}>×</button></div>
    <div style={{background:T.bgSubtle,borderRadius:14,padding:14,marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,marginBottom:8,color:T.textSec}}>NEW MESSAGE</div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {emojis.map(e=><button key={e} onClick={()=>setNewMsg({...newMsg,emoji:e})} style={{padding:"6px 8px",borderRadius:8,border:`2px solid ${newMsg.emoji===e?"#6366f1":T.border}`,background:newMsg.emoji===e?"#6366f108":T.bgCard,fontSize:16,cursor:"pointer"}}>{e}</button>)}
      </div>
      <textarea value={newMsg.text} onChange={e=>setNewMsg({...newMsg,text:e.target.value})} placeholder="Type your message..." rows={3} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${T.border}`,background:T.bgCard,color:T.text,fontSize:13,resize:"none",marginBottom:8}}/>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input value={newMsg.author} onChange={e=>setNewMsg({...newMsg,author:e.target.value})} placeholder="From" style={{flex:1,padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.bgCard,color:T.text,fontSize:12}}/>
        <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:T.textSec,cursor:"pointer"}}><input type="checkbox" checked={newMsg.pinned} onChange={e=>setNewMsg({...newMsg,pinned:e.target.checked})} style={{cursor:"pointer"}}/>📌 Pin</label>
        <button onClick={add} style={{padding:"8px 16px",borderRadius:10,border:"none",background:"#6366f1",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Post</button>
      </div>
    </div>
    <div style={{maxHeight:300,overflow:"auto"}}>
      {msgs.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:T.textMuted,fontSize:12}}>No messages yet</div>}
      {msgs.map(m=><div key={m.id} style={{padding:"10px 12px",borderRadius:10,marginBottom:6,background:m.pinned?"#fffbeb":T.bgSubtle,border:m.pinned?"1px solid #fde68a":`1px solid ${T.borderLight}`,display:"flex",gap:8,alignItems:"flex-start"}}>
        <span style={{fontSize:18}}>{m.emoji}</span>
        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:T.text}}>{m.text}</div><div style={{fontSize:10,color:T.textMuted}}>— {m.author} · {m.timestamp}</div></div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>pin(m.id)} title="Pin" style={{background:"none",border:"none",cursor:"pointer",fontSize:14,opacity:m.pinned?1:0.4}}>📌</button>
          <button onClick={()=>rm(m.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#ef4444"}}>🗑️</button>
        </div>
      </div>)}
    </div>
    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button onClick={onClose} style={{flex:1,padding:12,borderRadius:12,border:`1px solid ${T.border}`,background:T.bgCard,color:T.textSec,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
      <button onClick={()=>{onSave(msgs);onClose();}} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#059669",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>💾 Save Messages</button>
    </div>
  </Modal>;
}

/* ===== RACE TRACKS ===== */
function RaceTrack({agents,field,maxVal,icon,title,T}){
  const sorted=[...agents].sort((a,b)=>(b[field]||0)-(a[field]||0));
  return <div style={{background:T.bgCard,borderRadius:16,padding:20,border:`1px solid ${T.border}`,marginBottom:16,boxShadow:T.shadow}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{title}</div>
    {sorted.map((a,i)=>{const val=a[field]||0;const pct=maxVal>0?Math.min((val/maxVal)*100,100):0;
      return <div key={a.id} style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4,color:T.textSec}}>
          <span style={{fontWeight:700,color:a.color}}>{a.avatar} {a.name.split(" ")[0]}{i===0&&val>0?" — LEADER":""}</span>
          <span style={{fontWeight:700}}>{field==="totalRevenue"?fmtPrice(val):val+" policies"}</span>
        </div>
        <div style={{position:"relative",height:28,background:T.bgSubtle,borderRadius:14,overflow:"hidden"}}>
          <div style={{width:`${Math.max(pct,4)}%`,height:"100%",background:`linear-gradient(90deg, ${a.color}44, ${a.color})`,borderRadius:14,transition:"width 1.5s"}}/>
          <div style={{position:"absolute",right:`${100-Math.max(pct,4)}%`,top:"50%",transform:"translateY(-50%)",fontSize:20,animation:field==="totalRevenue"?"raceMove 0.6s infinite":"gallop 0.5s infinite",marginRight:-12}}>{icon}</div>
        </div>
      </div>;})}
  </div>;
}

/* ===== DAILY MOTIVATION ===== */
function DailyMotivation({T}){
  const today=new Date();const idx=(today.getFullYear()*365+today.getMonth()*31+today.getDate())%MOTIVATIONAL_QUOTES.length;
  const q=MOTIVATIONAL_QUOTES[idx];
  return <div style={{background:`linear-gradient(135deg, #1a3c6e, #2563eb)`,borderRadius:16,padding:"18px 20px",marginBottom:14,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-20,right:-20,fontSize:80,opacity:0.08,transform:"rotate(15deg)"}}>💬</div>
    <div style={{fontSize:10,fontWeight:700,color:"#93c5fd",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Daily Motivation</div>
    <div style={{fontSize:15,fontWeight:700,color:"#ffffff",lineHeight:1.5,marginBottom:8,fontStyle:"italic"}}>"{q.quote}"</div>
    <div style={{fontSize:11,color:"#93c5fd",fontWeight:600}}>— {q.author}</div>
  </div>;
}

/* ===== MESSAGE BOARD (READ-ONLY) ===== */
function MessageBoard({messages,T}){
  const[collapsed,setCollapsed]=useState(false);
  const pinned=messages.filter(m=>m.pinned);
  const regular=messages.filter(m=>!m.pinned);
  const sorted=[...pinned,...regular];
  if(messages.length===0)return null;
  return <div style={{background:T.bgCard,borderRadius:16,border:`1px solid ${T.border}`,marginBottom:14,overflow:"hidden",boxShadow:T.shadow}}>
    <div onClick={()=>setCollapsed(!collapsed)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 18px",cursor:"pointer",borderBottom:collapsed?"none":`1px solid ${T.borderLight}`}}>
      <span style={{fontSize:16}}>📋</span>
      <span style={{fontSize:13,fontWeight:700,flex:1}}>Team Message Board</span>
      <span style={{fontSize:11,color:T.textMuted,background:T.bgSubtle,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{messages.length}</span>
      <span style={{fontSize:12,color:T.textMuted}}>{collapsed?"▼":"▲"}</span>
    </div>
    {!collapsed&&<div style={{padding:"10px 14px",maxHeight:220,overflow:"auto"}}>
      {sorted.map(m=><div key={m.id} style={{display:"flex",gap:10,padding:"8px 10px",borderRadius:10,marginBottom:6,background:m.pinned?"#fffbeb":T.bgSubtle,border:m.pinned?"1px solid #fde68a":`1px solid ${T.borderLight}`,alignItems:"flex-start"}}>
        <span style={{fontSize:20,flexShrink:0}}>{m.emoji}</span>
        <div style={{flex:1}}>
          {m.pinned&&<span style={{fontSize:8,background:"#f59e0b",color:"#fff",padding:"1px 5px",borderRadius:4,fontWeight:700,marginBottom:4,display:"inline-block"}}>📌 PINNED</span>}
          <div style={{fontSize:12,fontWeight:600,color:T.text,lineHeight:1.4}}>{m.text}</div>
          <div style={{fontSize:10,color:T.textMuted,marginTop:2}}>— {m.author} · {m.timestamp}</div>
        </div>
      </div>)}
    </div>}
  </div>;
}

      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}><span style={{color:T.textSec}}>{c.icon} {c.label}</span><span style={{color:c.color,fontWeight:700}}>{totalPolicies>0?Math.round((d.count/totalPolicies)*100):0}%</span></div>

                <div key={a.id} style={{padding:"12px 8px",borderRadius:12,textAlign:"center",background:isL?`${a.color}06`:T.bgSubtle,border:isL?`2px solid ${a.color}33`:`1px solid ${T.borderLight}`,position:"relative"}}>
                  {isL&&<div style={{position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",fontSize:12}}>👑</div>}
                  <div style={{fontSize:22,marginBottom:3}}>{a.avatar}</div><div style={{fontSize:10,fontWeight:700,color:a.color,marginBottom:6}}>{a.name.split(" ")[0]}</div>
                  {[{l:"Premium",v:`$${(a.totalRevenue/1000).toFixed(1)}K`},{l:"Total Pol.",v:a.totalPolicies},{l:"PL",v:aBreak.personal.count},{l:"Life",v:aBreak.life.count},{l:"Comm.",v:aBreak.commercial.count},{l:"Badges",v:`${aB}/16`},{l:"XP",v:aXP.toLocaleString()},...(aCTM?[{l:"📞 Calls",v:aCTM.answeredCalls||0}]:[])].map((r,j)=><div key={j}><div style={{fontSize:9,color:T.textMuted}}>{r.l}</div><div style={{fontSize:11,fontWeight:800,marginBottom:4,color:j===6?a.color:T.text}}>{r.v}</div></div>)}
                </div>);})}
            </div>
          </div>

          {/* Recent Wins */}
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>⚡ Recent Wins</div>
            {sales.length===0?<div style={{textAlign:"center",padding:"24px 0",color:T.textMuted}}><div style={{fontSize:32,marginBottom:6}}>🚀</div><div style={{fontSize:13,fontWeight:600}}>No policies in this period!</div></div>
            :[...sales].reverse().slice(0,6).map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:10,marginBottom:5,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
              <div style={{width:32,height:32,borderRadius:9,background:s.price>=5000?"#fef3c7":`${agent.color}10`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{s.price>=10000?"🐋":s.price>=5000?"💰":"✅"}</div>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{(s.name||"").split(" - ")[0]}</div><div style={{fontSize:10,color:T.textMuted}}>{s.type} · {s.platform} · {s.boundDate}</div></div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:700,color:s.price>=5000?"#b45309":"#059669"}}>{fmtPrice(s.price)}</div>
                <div style={{fontSize:9,color:T.textMuted,background:categorizePolicy(s.type)==="life"?"#fdf2f8":categorizePolicy(s.type)==="commercial"?"#f0fdf4":"#eef2ff",padding:"1px 5px",borderRadius:4,marginTop:2}}>{categorizePolicy(s.type)==="life"?"❤️ Life":categorizePolicy(s.type)==="commercial"?"🏢 Comm":"🏠 PL"}</div>
              </div>
            </div>)}
          </div>
        </div>}

        {/* ====== LEADERBOARD ====== */}
        {tab==="leaderboard"&&<div style={{animation:"slideUp 0.4s"}}>
          <RaceTrack agents={agents} field="totalRevenue" maxVal={maxTeamRev} icon="🏎️" title="🏎️ Premium Race" T={T}/>
          <RaceTrack agents={agents} field="totalPolicies" maxVal={maxTeamPol} icon="🐴" title="🐴 Policy Derby" T={T}/>

          {/* Revenue Rankings */}
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,marginBottom:14,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🏅 Revenue Rankings — {curPeriod?.name||"All Time"}</div>
            {sorted.map((a,i)=>{const tier=getTier(revTiers,a.totalRevenue),aXP=calcXP(a.sales,ctmData?ctmData[a.name]||ctmData[a.name.split(" ")[0]]||null:null),aLvl=getLevel(aXP),isMe=a.id===selAgent,aBreak=getPolicyBreakdown(a.sales);return(
              <div key={a.id} onClick={()=>setSelAgent(a.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:14,marginBottom:8,background:isMe?`${a.color}06`:T.bgSubtle,border:isMe?`1px solid ${a.color}33`:`1px solid ${T.borderLight}`,cursor:"pointer"}}>
                <div style={{width:34,height:34,borderRadius:10,background:i===0?"linear-gradient(135deg,#fbbf24,#f59e0b)":i===1?"linear-gradient(135deg,#d1d5db,#9ca3af)":i===2?"linear-gradient(135deg,#d97706,#b45309)":T.bgSubtle,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{rankEmojis[i]||`${i+1}`}</div>
                <div style={{width:40,height:40,borderRadius:12,background:`${a.color}10`,border:`2px solid ${a.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{a.avatar}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:700,color:isMe?a.color:T.text}}>{a.name}</span>{i===0&&a.totalRevenue>0&&<span style={{fontSize:9,background:"#f59e0b",color:"#fff",padding:"2px 8px",borderRadius:6,fontWeight:800}}>LEADER</span>}</div>
                  <div style={{display:"flex",gap:8,fontSize:10,color:T.textMuted,marginTop:2}}>
                    <span>Lvl {aLvl.current.level}</span>
                    <span>🏠{aBreak.personal.count}</span>
                    <span>❤️{aBreak.life.count}</span>
                    <span>🏢{aBreak.commercial.count}</span>
                    <span>{tier.current?`${tier.current.icon} ${tier.current.name}`:"—"}</span>
                  </div>
                  <div style={{marginTop:5}}><MiniBar value={a.totalRevenue} max={maxTeamRev} color={a.color} height={4} T={T}/></div>
                </div>
                <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:800,color:i===0?"#b45309":T.text}}>{fmtPrice(a.totalRevenue)}</div><div style={{fontSize:10,color:a.color,fontWeight:600}}>{aXP.toLocaleString()} XP</div></div>
              </div>);})}
          </div>

          {/* Life Leader */}
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,marginBottom:14,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>❤️ Life Sales Leader</div>
            {lifeBoard.map((a,i)=><div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,marginBottom:5,background:i===0&&a.lifePrem>0?"#fdf2f8":T.bgSubtle,border:i===0&&a.lifePrem>0?"1px solid #fbcfe8":`1px solid ${T.borderLight}`}}><span style={{fontSize:16}}>{a.avatar}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:a.color}}>{a.name.split(" ")[0]}</div><div style={{fontSize:10,color:T.textMuted}}>{a.lifeCount} policies</div></div><div style={{fontSize:14,fontWeight:800,color:a.lifePrem>0?"#db2777":T.textMuted}}>{fmtPrice(a.lifePrem)}</div>{i===0&&a.lifePrem>0&&<span style={{fontSize:8,background:"#db2777",color:"#fff",padding:"2px 6px",borderRadius:4,fontWeight:700}}>LEADER</span>}</div>)}
          </div>

          {/* CTM Call Leaderboard */}
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700}}>📞 Call Leaderboard</div>
              {!CTM_WEB_APP_URL&&<span style={{fontSize:9,background:"#fef3c7",color:"#b45309",padding:"2px 8px",borderRadius:6,fontWeight:700}}>SET CTM_WEB_APP_URL TO ACTIVATE</span>}
              {CTM_WEB_APP_URL&&!ctmData&&<span style={{fontSize:9,background:"#fee2e2",color:"#dc2626",padding:"2px 8px",borderRadius:6,fontWeight:700}}>CONNECTING...</span>}
              {ctmData&&<span style={{fontSize:9,background:"#dcfce7",color:"#059669",padding:"2px 8px",borderRadius:6,fontWeight:700}}>● LIVE</span>}
            </div>
            {!ctmData?
              <div style={{textAlign:"center",padding:"24px 0",color:T.textMuted}}>
                <div style={{fontSize:36,marginBottom:8}}>📞</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>CTM Integration Pending</div>
                <div style={{fontSize:11}}>Deploy the Apps Script Web App and set CTM_WEB_APP_URL at the top of this file.</div>
              </div>
            :Object.entries(ctmData).sort((a,b)=>(b[1].answeredCalls||0)-(a[1].answeredCalls||0)).map(([name,stats],i)=>{
              const ag=agents.find(a=>a.name===name||a.name.startsWith(name))||{color:barColors[i],avatar:"👤"};
              const medals=["🥇","🥈","🥉","4️⃣"];
              return <div key={name} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,marginBottom:6,background:i===0?"#f0fdf4":T.bgSubtle,border:i===0?"1px solid #bbf7d0":`1px solid ${T.borderLight}`}}>
                <span style={{fontSize:16}}>{medals[i]||"·"}</span>
                <span style={{fontSize:18}}>{ag.avatar}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:ag.color}}>{name}</div>
                  <div style={{display:"flex",gap:10,fontSize:10,color:T.textMuted,marginTop:2}}>
                    <span>✅ {stats.answeredCalls||0} answered</span>
                    <span>📥 {stats.inboundLeads||0} inbound</span>
                    <span>📊 {stats.totalCalls||0} total</span>
                  </div>
                  <div style={{marginTop:4}}><MiniBar value={stats.answeredCalls||0} max={Math.max(...Object.values(ctmData).map(s=>s.answeredCalls||0),1)} color={ag.color} height={4} T={T}/></div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:800,color:ag.color}}>+{((stats.answeredCalls||0)*15+(stats.inboundLeads||0)*25).toLocaleString()} XP</div>
                  <div style={{fontSize:9,color:T.textMuted}}>from calls</div>
                </div>
              </div>;
            })}
            {ctmData&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:T.bgSubtle,fontSize:10,color:T.textMuted}}>
              📞 Answered call = <strong>+15 XP</strong> · 📥 Inbound lead = <strong>+25 XP</strong>
            </div>}
          </div>
        </div>}

        {/* ====== BADGES ====== */}
        {tab==="achievements"&&<div style={{animation:"slideUp 0.4s"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,padding:"12px 16px",background:T.bgCard,borderRadius:14,border:`1px solid ${T.border}`,boxShadow:T.shadow}}><div><span style={{fontSize:22,fontWeight:800}}>{earned}</span><span style={{fontSize:13,color:T.textMuted}}> / {badges.length}</span></div><div style={{fontSize:12,color:agent.color,fontWeight:600}}>{earned*250} XP</div></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {badges.map((b,i)=><div key={i} onMouseEnter={()=>setHoverBadge(i)} onMouseLeave={()=>setHoverBadge(null)} style={{padding:"14px 10px",borderRadius:14,textAlign:"center",background:b.earned?T.bgCard:T.bgSubtle,border:b.earned?`1px solid ${agent.color}33`:`1px solid ${T.borderLight}`,opacity:b.earned?1:0.4,transform:hoverBadge===i?"translateY(-3px) scale(1.02)":"none",transition:"all 0.25s",cursor:"default",position:"relative",boxShadow:b.earned?T.shadow:"none"}}>
              <div style={{fontSize:26,marginBottom:3,filter:b.earned?"none":"grayscale(1)"}}>{b.icon}</div><div style={{fontSize:10,fontWeight:700,color:b.earned?T.text:T.textMuted,marginBottom:1}}>{b.name}</div><div style={{fontSize:8,color:T.textMuted}}>{b.desc}</div>
              {b.earned&&<div style={{position:"absolute",top:4,right:4,fontSize:7,background:"#059669",color:"#fff",padding:"1px 4px",borderRadius:4,fontWeight:700}}>+250</div>}
            </div>)}
          </div>
        </div>}

        {/* ====== BREAKDOWN ====== */}
        {tab==="breakdown"&&<div style={{display:"flex",flexDirection:"column",gap:14,animation:"slideUp 0.4s"}}>
          {sales.length===0?<div style={{background:T.bgCard,borderRadius:16,padding:"36px 20px",border:`1px solid ${T.border}`,textAlign:"center"}}><div style={{fontSize:44,marginBottom:10}}>📭</div><div style={{fontSize:15,fontWeight:700,color:T.textMuted}}>No data in this period</div></div>
          :<>{[{title:"📊 Premium by Type",data:typeBreak,fmt:v=>fmtPrice(v)},{title:"🌐 Policies by Platform",data:platBreak,fmt:v=>`${v}`},...(Object.keys(leadBreak).length>0?[{title:"📍 By Lead Source",data:leadBreak,fmt:v=>`${v}`}]:[])].map((sec,si)=>
            <div key={si} style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{sec.title}</div>
              {Object.entries(sec.data).sort(([,a],[,b])=>b-a).map(([k,v],i)=><div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:T.textSec,fontWeight:600}}>{k}</span><span style={{color:barColors[i%barColors.length],fontWeight:700}}>{sec.fmt(v)}</span></div><MiniBar value={v} max={Math.max(...Object.values(sec.data))} color={barColors[i%barColors.length]} T={T}/></div>)}</div>)}
            <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>🏆 Top Deals</div>
              {[...sales].sort((a,b)=>b.price-a.price).slice(0,5).map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,marginBottom:5,background:i===0?"#fffbeb":T.bgSubtle,border:i===0?"1px solid #fde68a":`1px solid ${T.borderLight}`}}>
                <div style={{width:26,height:26,borderRadius:8,background:i===0?"#f59e0b":i===1?"#9ca3af":i===2?"#b45309":T.bgSubtle,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:i<3?"#fff":T.textMuted}}>{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{(s.name||"").split(" - ")[0]}</div><div style={{fontSize:9,color:T.textMuted}}>{s.type} · {categorizePolicy(s.type)==="life"?"❤️":categorizePolicy(s.type)==="commercial"?"🏢":"🏠"}</div></div>
                <div style={{fontSize:14,fontWeight:800,color:i===0?"#b45309":T.text}}>{fmtPrice(s.price)}</div></div>)}
            </div></>}
        </div>}

        {/* ====== QUESTS ====== */}
        {tab==="quests"&&<div style={{animation:"slideUp 0.4s"}}>
          <div style={{padding:"14px 16px",marginBottom:14,background:`${agent.color}06`,borderRadius:14,border:`1px solid ${agent.color}22`}}><div style={{fontSize:14,fontWeight:700,marginBottom:3}}>⚔️ Quest Board — {agent.name.split(" ")[0]}</div><div style={{fontSize:11,color:T.textSec}}>{quests.filter(q=>q.progress>=q.target).length}/{quests.length} completed</div></div>
          {questCats.map(cat=>{const cq=quests.filter(q=>q.cat===cat);return <div key={cat} style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:T.textSec,marginBottom:6,padding:"0 3px"}}>{cat}</div>
            {cq.map((q,i)=>{const pct=q.target>0?Math.min((q.progress/q.target)*100,100):0,done=pct>=100;return(
              <div key={i} style={{padding:"12px 14px",borderRadius:12,marginBottom:6,background:done?"#f0fdf4":T.bgCard,border:done?"1px solid #bbf7d0":`1px solid ${T.border}`,boxShadow:T.shadow}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{width:32,height:32,borderRadius:9,background:done?"#dcfce7":`${agent.color}08`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{done?"✅":q.icon}</div>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:done?"#059669":T.text}}>{q.name}</div><div style={{fontSize:9,color:T.textMuted}}>Reward: {q.reward}</div></div>
                  <div style={{fontSize:11,fontWeight:800,color:done?"#059669":agent.color}}>{pct.toFixed(0)}%</div></div>
                <MiniBar value={q.progress} max={q.target} color={done?"#059669":agent.color} height={4} T={T}/>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:9,color:T.textMuted}}><span>{q.progress>100?`$${q.progress.toLocaleString()}`:q.progress}/{q.target>100?`$${q.target.toLocaleString()}`:q.target}</span>{done&&<span style={{color:"#059669",fontWeight:700}}>DONE!</span>}</div>
              </div>);})}
          </div>;})}
        </div>}

        {/* ====== REVIEWS ====== */}
        {tab==="reviews"&&<div style={{animation:"slideUp 0.4s"}}>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(agents.length,4)},1fr)`,gap:10,marginBottom:16}}>
            {agents.map(a=>{const revs=a.sales.filter(s=>s.review&&s.review.trim()),aBreak=getPolicyBreakdown(a.sales);return(
              <div key={a.id} style={{background:T.bgCard,borderRadius:14,padding:16,border:`1px solid ${T.border}`,boxShadow:T.shadow,textAlign:"center"}}>
                <div style={{fontSize:26,marginBottom:4}}>{a.avatar}</div>
                <div style={{fontSize:12,fontWeight:700,color:a.color,marginBottom:6}}>{a.name.split(" ")[0]}</div>
                <div style={{fontSize:16,fontWeight:800,color:"#059669",marginBottom:1}}>{fmtShort(a.totalRevenue)}</div>
                <div style={{fontSize:10,color:T.textMuted,marginBottom:6}}>{a.totalPolicies} policies</div>
                <div style={{display:"flex",justifyContent:"center",gap:6,fontSize:10,color:T.textMuted,marginBottom:8}}>
                  <span>🏠{aBreak.personal.count}</span><span>❤️{aBreak.life.count}</span><span>🏢{aBreak.commercial.count}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  <span style={{fontSize:16}}>⭐</span><span style={{fontSize:14,fontWeight:800}}>{revs.length}</span><span style={{fontSize:10,color:T.textMuted}}>reviews</span>
                </div>
              </div>);})}
          </div>
          <div style={{background:T.bgCard,borderRadius:16,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>⭐ Customer Reviews ({allReviews.length})</div>
            {allReviews.length===0?<div style={{textAlign:"center",padding:"30px 0",color:T.textMuted}}><div style={{fontSize:36,marginBottom:8}}>💬</div><div style={{fontSize:13,fontWeight:600}}>No reviews yet. Add a "Review" column to your spreadsheet!</div></div>
            :allReviews.map((r,i)=><div key={i} style={{padding:"12px 14px",borderRadius:12,marginBottom:8,background:T.bgSubtle,border:`1px solid ${T.borderLight}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:18}}>{r.agentAvatar}</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:r.agentColor}}>{r.agentName}</div><div style={{fontSize:10,color:T.textMuted}}>{r.name} · {r.type} · {fmtPrice(r.price)} · {r.boundDate}</div></div>
                <span style={{fontSize:14}}>⭐</span>
              </div>
              <div style={{fontSize:12,color:T.textSec,fontStyle:"italic",lineHeight:1.5,padding:"4px 0 0 28px"}}>"{r.review}"</div>
            </div>)}
          </div>
        </div>}

        {/* FOOTER */}
        <div style={{marginTop:20,padding:"12px 16px",background:T.bgCard,borderRadius:12,border:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",fontSize:10,color:T.textMuted,flexWrap:"wrap",gap:6}}>
          <span>📡 {agents.length} Producers · {fmtPrice(teamRev)} / {teamPols} pol</span>
          <span>{curPeriod?.name||"All Time"} · {agent.name} · #{rankOf} · {earned}/{badges.length} Badges</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
